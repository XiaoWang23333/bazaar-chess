function startBattlePhase(){
  G.phase='battle';
  hideTooltip(); // 切换到战斗阶段时隐藏tooltip
  document.getElementById('shopPhase').style.display='none';
  document.getElementById('battlePhase').style.display='flex';
  document.getElementById('phaseText').textContent='⚔️ 战斗阶段';
  // 记录战斗前存活列表（用于检测本轮淘汰）
  G.aliveBeforeBattle=G.players.filter(p=>p.alive).map(p=>p.name);
  // 配对
  let alive=G.players.filter(p=>p.alive);
  let pairs=[];let pool=[...alive];
  while(pool.length>=2){
    let a=pool.splice(Math.floor(Math.random()*pool.length),1)[0];
    let b=pool.splice(Math.floor(Math.random()*pool.length),1)[0];
    pairs.push([a,b]);
  }
  // 找到我的对战
  let myPair=pairs.find(pr=>pr[0]===G.players[G.myIdx]||pr[1]===G.players[G.myIdx]);
  if(!myPair&&alive.length>1){myPair=[G.players[G.myIdx],alive.find(p=>p!==G.players[G.myIdx])];}
  if(!myPair){showFinal();return;}
  let me=myPair[0]===G.players[G.myIdx]?myPair[0]:myPair[1];
  let enemy=myPair[0]===me?myPair[1]:myPair[0];
  // AI对战
  let aiPairs=pairs.filter(pr=>pr!==myPair);
  aiPairs.forEach(pr=>resolveAiBattle(pr[0],pr[1]));
  // 玩家对战
  runBattle(me,enemy);
}

function resolveAiBattle(a,b){
  let sa=calcPower(a),sb=calcPower(b);
  let chance=sa/(sa+sb+1);
  // AI记住对手是否有强护盾（"软墙"），以便下次购物时买破盾道具
  let bShieldPower=b.items.reduce((s,it)=>{if(it&&it.type==='shield'){let m=1+((it.lv||1)-1)*0.5;return s+it.shield*m/(it.cd||3);}return s;},0);
  let aShieldPower=a.items.reduce((s,it)=>{if(it&&it.type==='shield'){let m=1+((it.lv||1)-1)*0.5;return s+it.shield*m/(it.cd||3);}return s;},0);
  a.lastEnemyShieldHigh=bShieldPower>5; // A的对手B护盾很强 → A下次需要买破盾
  b.lastEnemyShieldHigh=aShieldPower>5; // B的对手A护盾很强 → B下次需要买破盾
  if(Math.random()<chance){
    b.hp-=Math.min(3+G.round,20);a.wins++;b.losses++;
    if(b.hp<=0){b.hp=0;b.alive=false;G.elimOrder.push(b);}
  }else{
    a.hp-=Math.min(3+G.round,20);b.wins++;a.losses++;
    if(a.hp<=0){a.hp=0;a.alive=false;G.elimOrder.push(a);}
  }
}
function calcPower(p){
  let pw=0;
  // 英雄被动加成
  let dmgMul=1,shieldMul=1,healMul=1,dotMul=1,critRate=0;
  if(p.hero.passive==='weaponDmg')dmgMul+=p.hero.val;
  if(p.hero.passive==='shieldBoost')shieldMul+=p.hero.val;
  if(p.hero.passive==='healBoost')healMul+=p.hero.val;
  if(p.hero.passive==='dotBoost')dotMul+=p.hero.val;
  if(p.hero.passive==='critBoost')critRate+=p.hero.val;
  // 肉鸽技能加成
  let pk=getPerkBuffs(p);
  dmgMul+=pk.dmgMul+pk.allBoost;
  shieldMul+=pk.shieldMul+pk.allBoost;
  healMul+=pk.healMul+pk.allBoost;
  dotMul+=pk.dotMul+pk.allBoost;
  critRate+=pk.critRate;
  let critMul=1+critRate*((2+pk.critDmg)-1); // 期望暴击倍率
  p.items.forEach(it=>{
    if(!it)return;let m=1+((it.lv||1)-1)*0.5;
    if(it.dmg)pw+=it.dmg*m*dmgMul*critMul/(it.cd||2);
    if(it.heal)pw+=it.heal*m*healMul/(it.cd||3)*0.8;
    if(it.shield)pw+=it.shield*m*shieldMul/(it.cd||3)*0.7;
    if(it.burnDmg)pw+=it.burnDmg*(it.burnStack||1)*m*dotMul;
    if(it.poisonDmg)pw+=it.poisonDmg*(it.poisonStack||1)*m*dotMul*1.2;
    if(it.buffType)pw+=it.buffVal*50;
    if(it.remoteDmg)pw+=(it.remoteDmg||0)*m*0.6;
    if(it.wallBreakPct)pw+=30*m;
    if(it.siegeDmg)pw+=(it.siegeDmg||0)*m*0.8;
    if(it.lifesteal)pw+=20*m;
    if(it.freezeTime)pw+=25*m;
    if(it.reflectPct)pw+=15*m;
  });
  pw+=pk.regenPerSec*25; // 自然回复
  pw+=pk.maxHpBonus*0.5; // HP上限加成
  return pw+p.lv*3+(p.perks||[]).length*5;
}

function runBattle(me,enemy){
  const log=document.getElementById('battleLog');log.innerHTML='';
  document.getElementById('vsText').textContent=me.name+' VS '+enemy.name;
  document.getElementById('leftName').textContent=me.name;
  document.getElementById('rightName').textContent=enemy.name;

  // 获取buff加成
  function getBuffs(p){
    let b={dmgMul:1,cdMul:1,critRate:0,critDmg:2,allMul:1,shieldMul:1,healMul:1,dotMul:1,
           regenPerSec:0,thornsPct:0,maxHpBonus:0,executeDmg:0,armorPen:0,
           lastStandBoost:0,dotDecay:1,globalLifesteal:0,damageTaken:1};
    if(p.hero.passive==='weaponDmg')b.dmgMul+=p.hero.val;
    if(p.hero.passive==='critBoost')b.critRate+=p.hero.val;
    if(p.hero.passive==='shieldBoost')b.shieldMul+=p.hero.val;
    if(p.hero.passive==='healBoost')b.healMul+=p.hero.val;
    if(p.hero.passive==='dotBoost')b.dotMul+=p.hero.val;
    // 肉鸽技能加成
    let pk=getPerkBuffs(p);
    b.dmgMul+=pk.dmgMul+pk.allBoost;
    b.critRate+=pk.critRate;
    b.critDmg+=pk.critDmg;
    b.cdMul+=pk.cdMul;
    b.shieldMul+=pk.shieldMul+pk.allBoost;
    b.healMul+=pk.healMul+pk.allBoost;
    b.dotMul+=pk.dotMul+pk.allBoost;
    b.regenPerSec=pk.regenPerSec;
    b.thornsPct=pk.thornsPct;
    b.maxHpBonus=pk.maxHpBonus;
    b.executeDmg=pk.executeDmg;
    b.armorPen=pk.armorPen;
    b.lastStandBoost=pk.lastStandBoost;
    b.dotDecay=Math.max(0.3,1+pk.dotDecay);
    b.globalLifesteal=pk.globalLifesteal;
    b.damageTaken=1+pk.damageTaken;
    // buff道具效果（受buffBoost增幅）
    let bbMul=1+pk.buffBoost;
    p.items.forEach(it=>{
      if(!it||it.type!=='buff'&&it.type!=='special')return;
      if(it.buffType==='dmgUp')b.dmgMul+=it.buffVal*(it.lv||1)*bbMul;
      if(it.buffType==='hasteAll')b.cdMul-=it.buffVal*(it.lv||1)*bbMul;
      if(it.buffType==='crit')b.critRate+=it.buffVal*(it.lv||1)*bbMul;
      if(it.buffType==='allBoost'){let v=it.buffVal*bbMul;b.dmgMul+=v;b.healMul+=v;b.shieldMul+=v;}
    });
    b.cdMul=Math.max(b.cdMul,0.3);
    return b;
  }

  let bL=getBuffs(me),bR=getBuffs(enemy);
  let maxBHp=100+bL.maxHpBonus;let maxBHpR=100+bR.maxHpBonus;
  let hpL=maxBHp,hpR=maxBHpR,shL=0,shR=0;
  let burnL=0,burnR=0,burnDmgL=0,burnDmgR=0;
  let poisonL=0,poisonR=0,poisonDmgL=0,poisonDmgR=0;

  // 遥控炸弹状态
  let remoteBombUsedL={};let remoteBombUsedR={};
  // 渲染物品
  function renderBItems(items,containerId,isLeft){
    const c=document.getElementById(containerId);c.innerHTML='';
    items.forEach((it,idx)=>{
      if(!it)return;
      let d=document.createElement('div');d.className='bItem';
      let statCls='sutil';
      if(it.type==='weapon')statCls='sdmg';
      else if(it.type==='heal')statCls='sheal';
      else if(it.type==='shield')statCls='sshield';
      else if(it.type==='burn'||it.type==='poison')statCls='sdot';
      let tClr=TYPE_COLOR[it.type]||'#888';
      // 遥控炸弹特殊渲染：左方（玩家）显示引爆按钮
      let bombBtn='';
      if(it.id==='remoteBomb'&&isLeft){
        bombBtn=`<div class="bombBtn" data-idx="${idx}" style="position:absolute;bottom:0;left:0;right:0;background:linear-gradient(135deg,#dc2626,#f97316);color:#fff;font-size:9px;font-weight:bold;padding:2px 0;cursor:pointer;border-radius:0 0 6px 6px;text-align:center;transition:.2s;z-index:2;">💥 点击引爆!</div>`;
      }
      if(it.id==='remoteBomb'&&!isLeft){
        bombBtn=`<div style="position:absolute;bottom:0;left:0;right:0;background:rgba(220,38,38,.3);color:#f88;font-size:8px;padding:2px 0;text-align:center;border-radius:0 0 6px 6px;">🧨 遥控炸弹</div>`;
      }
      d.innerHTML=`<span class="biStatTotal" data-idx="${idx}">0</span><span>${it.icon}</span><span class="biStat ${statCls}" data-idx="${idx}">0</span><span class="biName">${it.name}<br><span style="font-size:7px;color:${tClr};">${TYPE_LABEL[it.type]?TYPE_LABEL[it.type].slice(2):''} Lv${it.lv||1}</span></span><div class="cdBar" style="width:0%"></div>${bombBtn}`;
      // 绑定引爆事件
      if(it.id==='remoteBomb'&&isLeft){
        d.style.cursor='pointer';
        d.addEventListener('click',function(){detonateRemoteBomb(idx);});
      }
      c.appendChild(d);
    });
  }

  // 遥控炸弹引爆函数
  function detonateRemoteBomb(idx){
    if(remoteBombUsedL[idx])return;
    let it=me.items[idx];
    if(!it||it.id!=='remoteBomb')return;
    remoteBombUsedL[idx]=true;
    let lv=it.lv||1;let lvMul=1+(lv-1)*0.5;
    let d=(it.remoteDmg||80)*bL.dmgMul*lvMul;
    // 遥控炸弹"炸墙"效果：无视50%护盾 + 额外摧毁40%现有护盾
    let shieldBefore=shR;
    let shieldDestroy=shR*0.4; // 炸毁40%护盾("炸开软墙")
    shR=Math.max(0,shR-shieldDestroy);
    let shieldIgnore=d*0.5;
    let throughShield=Math.min(shR,shieldIgnore);
    shR-=throughShield;
    hpR-=d;
    updateItemStats('left',idx,d+shieldDestroy);
    let wallMsg=shieldBefore>10?'🧱💥 炸开软墙! 摧毁'+Math.ceil(shieldDestroy)+'护盾! ':'';
    addLog('💥💥 '+wallMsg+'遥控炸弹引爆! 造成 '+Math.ceil(d)+' 伤害! (无视50%护盾)','dmg');
    updateBattleHp();
    // 视觉效果
    let els=document.querySelectorAll('#leftItems .bItem');
    if(els[idx]){
      els[idx].classList.add('active');
      els[idx].style.background='rgba(220,38,38,.4)';
      let btn=els[idx].querySelector('.bombBtn');
      if(btn){btn.textContent='✅ 已引爆';btn.style.background='#333';btn.style.cursor='default';}
      setTimeout(()=>{if(els[idx])els[idx].classList.remove('active');},600);
    }
    // 爆炸浮字
    floatMsg('💥 遥控炸弹! -'+Math.ceil(d)+'HP','#f44');
  }
  // 贡献统计
  let statsL=me.items.map(()=>0);   // 左方每个物品的贡献值
  let statsR=enemy.items.map(()=>0); // 右方每个物品的贡献值
  let trigCountL=me.items.map(()=>0);
  let trigCountR=enemy.items.map(()=>0);
  // 挂到全局以便结算使用
  G.lastBattleStats={myItems:me.items,enemyItems:enemy.items,statsL,statsR,trigCountL,trigCountR};
  function updateItemStats(side,idx,val){
    if(side==='left'){statsL[idx]=(statsL[idx]||0)+val;trigCountL[idx]=(trigCountL[idx]||0)+1;}
    else{statsR[idx]=(statsR[idx]||0)+val;trigCountR[idx]=(trigCountR[idx]||0)+1;}
    let containerId=side==='left'?'leftItems':'rightItems';
    let els=document.querySelectorAll('#'+containerId+' .bItem');
    if(els[idx]){
      let statEl=els[idx].querySelector('.biStat');
      let totalEl=els[idx].querySelector('.biStatTotal');
      let s=side==='left'?statsL[idx]:statsR[idx];
      let cnt=side==='left'?trigCountL[idx]:trigCountR[idx];
      if(statEl)statEl.textContent=Math.ceil(s);
      if(totalEl)totalEl.textContent='x'+cnt;
    }
  }
  renderBItems(me.items,'leftItems',true);renderBItems(enemy.items,'rightItems',false);

  // 更新HP条
  function updateBattleHp(){
    let pL=Math.max(0,hpL)/maxBHp*100,pR=Math.max(0,hpR)/maxBHpR*100;
    const lBar=document.getElementById('leftHpBar'),rBar=document.getElementById('rightHpBar');
    lBar.style.width=pL+'%';rBar.style.width=pR+'%';
    lBar.className='hpBar'+(pL<30?' low':'');rBar.className='hpBar'+(pR<30?' low':'');
    document.getElementById('leftHpText').textContent=Math.ceil(Math.max(0,hpL))+'/'+maxBHp+(shL>0?' +🛡️'+Math.ceil(shL):'');
    document.getElementById('rightHpText').textContent=Math.ceil(Math.max(0,hpR))+'/'+maxBHpR+(shR>0?' +🛡️'+Math.ceil(shR):'');
  }
  updateBattleHp();

  function addLog(msg,cls){
    let p=document.createElement('p');p.className=cls||'';p.textContent=msg;
    log.appendChild(p);log.scrollTop=log.scrollHeight;
  }

  // 模拟战斗 (较慢速度以便观战)
  let t=0,dt=0.1,maxTime=25;
  let cdL=me.items.map(it=>it&&it.cd?it.cd*bL.cdMul:999);
  let cdR=enemy.items.map(it=>it&&it.cd?it.cd*bR.cdMul:999);
  let timerL=me.items.map(()=>0);
  let timerR=enemy.items.map(()=>0);
  G.battleEndReason=''; // 记录战斗结束原因

  let battleInterval=setInterval(()=>{
    for(let step=0;step<2;step++){
      t+=dt;
      // 更新计时器UI
      let remain=Math.max(0,maxTime-t);
      let timeEl=document.getElementById('battleTimeText');
      let timeBar=document.getElementById('battleTimeBar');
      if(timeEl)timeEl.textContent=Math.ceil(remain)+'s';
      if(timeBar)timeBar.style.width=(remain/maxTime*100)+'%';

      if(hpL<=0||hpR<=0||t>=maxTime){
        clearInterval(battleInterval);
        if(t>=maxTime&&hpL>0&&hpR>0){
          G.battleEndReason='timeout';
        }else if(hpL<=0){
          G.battleEndReason='killed';
        }else{
          G.battleEndReason='kill';
        }
        // 确保HP不低于0再做最终一次UI更新
        hpL=Math.max(0,hpL);hpR=Math.max(0,hpR);
        updateBattleHp();
        // 延迟一下让玩家看到最终血条状态
        setTimeout(()=>endBattle(me,enemy,hpL,hpR),600);
        return;
      }
      // DOT（受dotDecay影响衰减速度）
      if(burnR>0){let d=burnDmgR*dt;hpR-=d;burnR=Math.max(0,burnR-dt*0.5*bL.dotDecay);}
      if(burnL>0){let d=burnDmgL*dt;hpL-=d;burnL=Math.max(0,burnL-dt*0.5*bR.dotDecay);}
      if(poisonR>0){let d=poisonDmgR*dt;hpR-=d;poisonR=Math.max(0,poisonR-dt*0.5*bL.dotDecay);}
      if(poisonL>0){let d=poisonDmgL*dt;hpL-=d;poisonL=Math.max(0,poisonL-dt*0.5*bR.dotDecay);}
      // 自然回复（肉鸽技能）
      if(bL.regenPerSec>0)hpL=Math.min(maxBHp,hpL+bL.regenPerSec*dt);
      if(bR.regenPerSec>0)hpR=Math.min(maxBHpR,hpR+bR.regenPerSec*dt);
      // 左方物品
      me.items.forEach((it,i)=>{
        if(!it||!it.cd)return;timerL[i]+=dt;
        let els=document.querySelectorAll('#leftItems .bItem');
        if(els[i]){let bar=els[i].querySelector('.cdBar');if(bar)bar.style.width=(timerL[i]/cdL[i]*100)+'%';}
        if(timerL[i]>=cdL[i]){
          timerL[i]=0;let lv=it.lv||1;let lvMul=1+(lv-1)*0.5;let crit=Math.random()<bL.critRate;let cm=crit?bL.critDmg:1;
          // 绝地反击
          let lsMul=(bL.lastStandBoost>0&&hpL<maxBHp*0.25)?(1+bL.lastStandBoost):1;
          if(it.type==='weapon'){
            let d=it.dmg*bL.dmgMul*lvMul*cm*lsMul;
            // 斩杀
            if(bL.executeDmg>0&&hpR<maxBHpR*0.3)d*=(1+bL.executeDmg);
            // 破甲
            if(shR>0){let pen=bL.armorPen||0;let effShield=shR*(1-pen);let ab=Math.min(effShield,d);shR-=ab;d-=ab;}
            // 受伤加成（对手的damageTaken）
            d*=bR.damageTaken;
            hpR-=d;
            // 吸血（道具自带+全局吸血）
            let ls=(it.lifesteal||0)+bL.globalLifesteal;
            if(ls>0)hpL=Math.min(maxBHp,hpL+d*ls);
            // 荆棘反射（对手的thornsPct）
            if(bR.thornsPct>0){let ref=d*bR.thornsPct;hpL-=ref;}
            updateItemStats('left',i,d);
            addLog((crit?'💥暴击! ':'')+'['+it.name+'] 造成 '+Math.ceil(d)+' 伤害','dmg');
            if(els[i])els[i].classList.add('active');setTimeout(()=>{if(els[i])els[i].classList.remove('active');},400);
          }
          if(it.type==='shield'){let s=it.shield*bL.shieldMul*lvMul*lsMul;shL+=s;updateItemStats('left',i,s);addLog('['+it.name+'] 产生 '+Math.ceil(s)+' 护盾','shield');}
          if(it.type==='heal'){let h=it.heal*bL.healMul*lvMul*lsMul;hpL=Math.min(maxBHp,hpL+h);updateItemStats('left',i,h);addLog('['+it.name+'] 恢复 '+Math.ceil(h)+' 生命','heal');}
          if(it.type==='burn'){let s=(it.burnStack||1)*bL.dotMul;burnR+=s;burnDmgR=it.burnDmg*bL.dotMul*lvMul;updateItemStats('left',i,it.burnDmg*s);addLog('['+it.name+'] 叠加灼烧x'+Math.ceil(s),'dmg');}
          if(it.type==='poison'){let s=(it.poisonStack||1)*bL.dotMul;poisonR+=s;poisonDmgR=it.poisonDmg*bL.dotMul*lvMul;updateItemStats('left',i,it.poisonDmg*s);addLog('['+it.name+'] 叠加毒素x'+Math.ceil(s),'dmg');}
          if(it.type==='special'&&it.reflectPct){/* handled passively */}
          if(it.type==='special'&&it.freezeTime){updateItemStats('left',i,5);addLog('['+it.name+'] 冻结对手!','shield');timerR=timerR.map(()=>-(it.freezeTime||1));}
          // 攻城锤：炸开对手"软墙"(护盾)
          if(it.type==='special'&&it.wallBreakPct&&!it.siegeDmg){
            let breakAmt=shR*(it.wallBreakPct||0.6)*lvMul;
            let oldSh=shR;
            shR=Math.max(0,shR-breakAmt);
            let totalDmg=breakAmt;
            hpR-=breakAmt*0.5;
            updateItemStats('left',i,totalDmg);
            addLog(breakAmt>5?'🧱🏗️ ['+it.name+'] 炸开软墙! 摧毁 '+Math.ceil(breakAmt)+' 护盾! 并造成'+Math.ceil(breakAmt*0.5)+'伤害':'🏗️ ['+it.name+'] 试图破盾(护盾不足)','dmg');
            if(els[i])els[i].classList.add('active');setTimeout(()=>{if(els[i])els[i].classList.remove('active');},400);
          }
          // 攻城炸弹：炸毁全部"软墙"+额外伤害
          if(it.type==='special'&&it.siegeDmg){
            let breakAmt=shR*(it.wallBreakPct||1.0);
            shR=0;
            let totalDmg=(it.siegeDmg||40)*lvMul*bL.dmgMul+breakAmt*0.3;
            hpR-=totalDmg;
            updateItemStats('left',i,totalDmg);
            addLog(breakAmt>5?'🧱💣 ['+it.name+'] 炸毁全部软墙('+Math.ceil(breakAmt)+'护盾)! 造成'+Math.ceil(totalDmg)+'伤害!':'💣 ['+it.name+'] 轰炸造成'+Math.ceil(totalDmg)+'伤害!','dmg');
            if(els[i])els[i].classList.add('active');setTimeout(()=>{if(els[i])els[i].classList.remove('active');},400);
          }
        }
      });
      // 右方物品
      enemy.items.forEach((it,i)=>{
        if(!it)return;
        // 敌方AI自动引爆遥控炸弹（cd:0的特殊处理，不走常规CD逻辑）
        if(it.id==='remoteBomb'&&!remoteBombUsedR[i]){
          // AI更智能：当被"软墙"（护盾）挡住时，更积极地引爆炸弹来"炸开墙"
          let shieldBlockRatio=shL/(maxBHp+shL+0.01); // 护盾占总有效HP比例
          let blockedByWall=shieldBlockRatio>0.2; // 护盾>20%视为被"墙"挡住
          let shouldDetonate=false;
          if(blockedByWall&&t>1.0) shouldDetonate=true; // 被护盾挡住且战斗已开始 → 立即炸墙!
          else if(shL>30&&t>2.0) shouldDetonate=true; // 护盾超过30点 → 炸开
          else if(hpL<maxBHp*0.6) shouldDetonate=true; // 对手HP较低 → 趁机引爆
          else if(t>maxTime*0.4) shouldDetonate=true; // 战斗过半 → 不能再等了
          else if(Math.random()<0.008) shouldDetonate=true; // 小概率随机触发
          if(shouldDetonate){
            remoteBombUsedR[i]=true;
            let lv2=it.lv||1;let lvMul2=1+(lv2-1)*0.5;
            let d2=(it.remoteDmg||80)*bR.dmgMul*lvMul2;
            // 遥控炸弹"炸墙"效果：无视50%护盾 + 额外摧毁40%现有护盾
            let shieldBefore=shL;
            let shieldDestroy=shL*0.4; // 炸毁40%护盾("炸开软墙")
            shL=Math.max(0,shL-shieldDestroy);
            let shieldIgnore2=d2*0.5;
            let throughShield2=Math.min(shL,shieldIgnore2);
            shL-=throughShield2;
            hpL-=d2;
            updateItemStats('right',i,d2+shieldDestroy);
            let wallMsg=shieldBefore>10?'🧱💥 炸开软墙! 摧毁'+Math.ceil(shieldDestroy)+'护盾! ':'';
            addLog('💥💥 '+wallMsg+'对手引爆遥控炸弹! 造成 '+Math.ceil(d2)+' 伤害!','dmg');
            floatMsg(shieldBefore>10?'🧱💥 炸开软墙! -'+Math.ceil(d2)+'HP':'💥 敌方遥控炸弹! -'+Math.ceil(d2)+'HP','#f44');
            let els2=document.querySelectorAll('#rightItems .bItem');
            if(els2[i]){els2[i].classList.add('active');els2[i].style.background='rgba(220,38,38,.4)';setTimeout(()=>{if(els2[i])els2[i].classList.remove('active');},600);}
          }
        }
        if(!it.cd)return;timerR[i]+=dt;
        let els=document.querySelectorAll('#rightItems .bItem');
        if(els[i]){let bar=els[i].querySelector('.cdBar');if(bar)bar.style.width=(timerR[i]/cdR[i]*100)+'%';}
        if(timerR[i]>=cdR[i]){
          timerR[i]=0;let lv=it.lv||1;let lvMul=1+(lv-1)*0.5;let crit=Math.random()<bR.critRate;let cm=crit?bR.critDmg:1;
          let lsMulR=(bR.lastStandBoost>0&&hpR<maxBHpR*0.25)?(1+bR.lastStandBoost):1;
          if(it.type==='weapon'){
            let d=it.dmg*bR.dmgMul*lvMul*cm*lsMulR;
            if(bR.executeDmg>0&&hpL<maxBHp*0.3)d*=(1+bR.executeDmg);
            if(shL>0){let pen=bR.armorPen||0;let effShield=shL*(1-pen);let ab=Math.min(effShield,d);shL-=ab;d-=ab;}
            d*=bL.damageTaken;
            hpL-=d;
            let ls=(it.lifesteal||0)+bR.globalLifesteal;
            if(ls>0)hpR=Math.min(maxBHpR,hpR+d*ls);
            if(bL.thornsPct>0){let ref=d*bL.thornsPct;hpR-=ref;}
            updateItemStats('right',i,d);
            addLog((crit?'💥暴击! ':'')+'对手['+it.name+'] 造成 '+Math.ceil(d)+' 伤害','dmg');
            if(els[i])els[i].classList.add('active');setTimeout(()=>{if(els[i])els[i].classList.remove('active');},400);
          }
          if(it.type==='shield'){let s=it.shield*bR.shieldMul*lvMul*lsMulR;shR+=s;updateItemStats('right',i,s);}
          if(it.type==='heal'){let h=it.heal*bR.healMul*lvMul*lsMulR;hpR=Math.min(maxBHpR,hpR+h);updateItemStats('right',i,h);}
          if(it.type==='burn'){let s=(it.burnStack||1)*bR.dotMul;burnL+=s;burnDmgL=it.burnDmg*bR.dotMul*lvMul;updateItemStats('right',i,it.burnDmg*s);}
          if(it.type==='poison'){let s=(it.poisonStack||1)*bR.dotMul;poisonL+=s;poisonDmgL=it.poisonDmg*bR.dotMul*lvMul;updateItemStats('right',i,it.poisonDmg*s);}
          if(it.type==='special'&&it.freezeTime){updateItemStats('right',i,5);timerL=timerL.map(()=>-(it.freezeTime||1));}
          // 敌方攻城锤 — 炸开"软墙"
          if(it.type==='special'&&it.wallBreakPct&&!it.siegeDmg){
            let breakAmt=shL*(it.wallBreakPct||0.6)*lvMul;
            shL=Math.max(0,shL-breakAmt);
            hpL-=breakAmt*0.5;
            updateItemStats('right',i,breakAmt);
            addLog(breakAmt>5?'🧱🏗️ 对手['+it.name+'] 炸开软墙! 摧毁 '+Math.ceil(breakAmt)+' 护盾!':'🏗️ 对手['+it.name+'] 试图破盾(护盾不足)','dmg');
          }
          // 敌方攻城炸弹 — 炸毁全部"软墙"
          if(it.type==='special'&&it.siegeDmg){
            let breakAmt=shL*(it.wallBreakPct||1.0);
            shL=0;
            let totalDmg=(it.siegeDmg||40)*lvMul*bR.dmgMul+breakAmt*0.3;
            hpL-=totalDmg;
            updateItemStats('right',i,totalDmg);
            addLog(breakAmt>5?'🧱💣 对手['+it.name+'] 炸毁全部软墙('+Math.ceil(breakAmt)+'护盾)! 造成'+Math.ceil(totalDmg)+'伤害!':'💣 对手['+it.name+'] 轰炸造成'+Math.ceil(totalDmg)+'伤害!','dmg');
          }
        }
      });
      updateBattleHp();
    }
  },100);
}

function endBattle(me,enemy,hpL,hpR){
  let won=hpL>hpR;
  let dmg=Math.min(3+G.round,20);
  let hpBefore=me.hp;
  let endReason=G.battleEndReason||'';
  // AI记住对手护盾强度 → 下次会买破盾道具"炸墙"
  let myShieldPower=me.items.reduce((s,it)=>{if(it&&it.type==='shield'){let m=1+((it.lv||1)-1)*0.5;return s+it.shield*m/(it.cd||3);}return s;},0);
  let enemyShieldPower=enemy.items.reduce((s,it)=>{if(it&&it.type==='shield'){let m=1+((it.lv||1)-1)*0.5;return s+it.shield*m/(it.cd||3);}return s;},0);
  if(enemy.ai)enemy.lastEnemyShieldHigh=myShieldPower>5;
  me.lastEnemyShieldHigh=enemyShieldPower>5;
  if(won){
    me.wins++;enemy.hp-=dmg;enemy.losses++;
    if(enemy.hp<=0){enemy.hp=0;enemy.alive=false;G.elimOrder.push(enemy);}
    // XP
    me.xp++;if(me.xp>=me.xpNeed){me.lv++;me.xp=0;me.xpNeed=me.lv+1;}
    // 拾荒者技能：战胜额外金币
    let wg=getPerkBuffs(me).winGold||0;
    if(wg>0){me.gold+=wg;G.gold=me.gold;}
  }else{
    enemy.wins++;me.hp-=dmg;me.losses++;
    if(me.hp<=0){me.hp=0;me.alive=false;G.elimOrder.push(me);}
    me.xp+=0.5;
  }
  // 显示结算 — 传入战斗HP、全局HP、结束原因
  showResult(won,me,enemy,dmg,hpBefore,hpL,hpR,endReason);
}

function showResult(won,me,enemy,dmg,hpBefore,battleHpL,battleHpR,endReason){
  const o=document.getElementById('resultOverlay');o.style.display='flex';
  const b=document.getElementById('resultBox');
  b.style.maxWidth='520px';b.style.maxHeight='80vh';b.style.overflowY='auto';

  // 结束原因文字
  let reasonText='';
  if(endReason==='timeout'){
    reasonText=`<div class="rDetail" style="color:#fa0;font-weight:bold;">⏱️ 时间到！按剩余战斗血量判定胜负</div>
      <div class="rDetail" style="font-size:12px;color:#888;">我方战斗HP: ${Math.ceil(battleHpL)} | 对手战斗HP: ${Math.ceil(battleHpR)}</div>`;
  }else if(won){
    reasonText=`<div class="rDetail" style="color:#4f4;">✅ 对手战斗HP归零，你获胜了！</div>`;
  }else{
    reasonText=`<div class="rDetail" style="color:#f88;">❌ 你的战斗HP归零，战斗失败</div>`;
  }

  // ========= 构建双方物品贡献统计 =========
  let contribHtml='';
  if(G.lastBattleStats){
    let bs=G.lastBattleStats;
    // 计算双方总贡献值
    let totalL=bs.statsL.reduce((s,v)=>s+(v||0),0);
    let totalR=bs.statsR.reduce((s,v)=>s+(v||0),0);
    let totalAll=totalL+totalR||1;

    // 双方总贡献对比条
    contribHtml+=`<div style="margin-top:12px;background:rgba(0,0,0,.25);border-radius:10px;padding:10px;">`;
    contribHtml+=`<div style="font-size:13px;font-weight:bold;color:#ffd200;margin-bottom:6px;">📊 双方物品贡献对比</div>`;
    contribHtml+=`<div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px;">
      <span style="color:#60a5fa;">我方 ${Math.ceil(totalL)}</span>
      <span style="color:#f87171;">对手 ${Math.ceil(totalR)}</span>
    </div>`;
    contribHtml+=`<div class="contribBar"><div class="cbLeft" style="width:${totalL/totalAll*100}%"></div><div class="cbRight" style="width:${totalR/totalAll*100}%"></div></div>`;

    // 我方物品详情（带进度条）
    let myEntries=[];
    bs.myItems.forEach((it,i)=>{if(it&&bs.statsL[i]>0)myEntries.push({icon:it.icon,name:it.name,type:it.type,val:bs.statsL[i],cnt:bs.trigCountL[i]});});
    myEntries.sort((a,b)=>b.val-a.val);
    let maxValL=myEntries.length>0?myEntries[0].val:1;

    if(myEntries.length>0){
      contribHtml+=`<div style="margin-top:8px;font-size:11px;color:#60a5fa;font-weight:bold;">🔵 我方物品:</div>`;
      myEntries.forEach(e=>{
        let pct=e.val/maxValL*100;
        let clr=TYPE_COLOR[e.type]||'#aaa';
        contribHtml+=`<div class="contribEntry">
          <span style="min-width:20px;">${e.icon}</span>
          <span style="min-width:50px;font-size:10px;">${e.name}</span>
          <span style="font-size:9px;color:${clr};min-width:32px;">${TYPE_LABEL[e.type]?TYPE_LABEL[e.type].slice(2):''}</span>
          <div class="ceBar"><div class="ceBarFill" style="width:${pct}%;background:${clr};"></div></div>
          <span class="ceVal" style="color:${clr};">${Math.ceil(e.val)}</span>
          <span style="font-size:8px;color:#666;">x${e.cnt}</span>
        </div>`;
      });
    }

    // 对手物品详情（带进度条）
    let enemyEntries=[];
    bs.enemyItems.forEach((it,i)=>{if(it&&bs.statsR[i]>0)enemyEntries.push({icon:it.icon,name:it.name,type:it.type,val:bs.statsR[i],cnt:bs.trigCountR[i]});});
    enemyEntries.sort((a,b)=>b.val-a.val);
    let maxValR=enemyEntries.length>0?enemyEntries[0].val:1;

    if(enemyEntries.length>0){
      contribHtml+=`<div style="margin-top:8px;font-size:11px;color:#f87171;font-weight:bold;">🔴 对手物品:</div>`;
      enemyEntries.forEach(e=>{
        let pct=e.val/maxValR*100;
        let clr=TYPE_COLOR[e.type]||'#aaa';
        contribHtml+=`<div class="contribEntry">
          <span style="min-width:20px;">${e.icon}</span>
          <span style="min-width:50px;font-size:10px;">${e.name}</span>
          <span style="font-size:9px;color:${clr};min-width:32px;">${TYPE_LABEL[e.type]?TYPE_LABEL[e.type].slice(2):''}</span>
          <div class="ceBar"><div class="ceBarFill" style="width:${pct}%;background:${clr};"></div></div>
          <span class="ceVal" style="color:${clr};">${Math.ceil(e.val)}</span>
          <span style="font-size:8px;color:#666;">x${e.cnt}</span>
        </div>`;
      });
    }
    contribHtml+=`</div>`;
  }

  if(!me.alive){
    b.innerHTML=`<h2 style="color:#f44;">💀 你被淘汰了!</h2>
      <div class="rDetail">第 ${8-G.elimOrder.indexOf(me)} 名</div>
      <div class="rDetail" style="font-size:11px;color:#c8a;margin:2px 0;padding:4px 8px;background:rgba(160,80,200,.12);border-radius:6px;display:inline-block;">🏷️ 对手特性: ${enemy.hero.icon} ${enemy.hero.desc}</div>
      ${reasonText}
      <div class="rDetail" style="margin-top:6px;">败方受到 <span style="color:#f88;font-weight:bold;">${dmg}</span> 点赛制伤害</div>
      <div class="rDetail">全局HP: ${Math.ceil(hpBefore)} → 0</div>
      ${contribHtml}
      <button onclick="showFinal()">查看排名</button>`;
    return;
  }

  let hpChangeText=won?
    `败方 ${enemy.name} 受到 <span style="color:#f88;font-weight:bold;">${dmg}</span> 点赛制伤害`:
    `你受到 <span style="color:#f88;font-weight:bold;">${dmg}</span> 点赛制伤害 (${Math.ceil(hpBefore)} → ${Math.ceil(me.hp)})`;

  b.innerHTML=`<h2 style="color:${won?'#4f4':'#f88'};">${won?'🎉 胜利!':'😢 战败!'}</h2>
    <div class="rDetail">对手: ${enemy.name}</div>
    <div class="rDetail" style="font-size:11px;color:#c8a;margin:2px 0;padding:4px 8px;background:rgba(160,80,200,.12);border-radius:6px;display:inline-block;">🏷️ 职业特性: ${enemy.hero.icon} ${enemy.hero.desc}</div>
    ${reasonText}
    <div class="rDetail" style="margin-top:4px;">${hpChangeText}</div>
    <div style="margin-top:6px;padding:8px;background:rgba(0,0,0,.2);border-radius:8px;">
      <div style="font-size:11px;color:#888;margin-bottom:4px;">💡 说明：每场战斗双方都以100战斗HP开始对打，战斗${endReason==='timeout'?'时间到后按剩余HP判定':'HP先归零方'}输。输方扣除<span style="color:#ffd200;">赛制伤害</span>(第${G.round}回合=${dmg}点)到全局HP。</div>
      <div class="rDetail" style="margin:0;">我的全局HP: <span style="color:${me.hp<30?'#f44':'#4f4'};font-weight:bold;">${Math.ceil(me.hp)}</span> / ${me.maxHp}</div>
    </div>
    <div class="rDetail">战绩: ${me.wins}胜 ${me.losses}负</div>
    ${(me.perks||[]).length>0?`<div class="rDetail" style="font-size:10px;color:#ffd200;margin:2px 0;">🎲 我的技能(${me.perks.length}): ${me.perks.map(p=>p.icon).join('')}</div>`:''}
    ${(enemy.perks||[]).length>0?`<div class="rDetail" style="font-size:10px;color:#f87;margin:2px 0;">🎲 对手技能(${enemy.perks.length}): ${enemy.perks.map(p=>p.icon).join('')}</div>`:''}
    ${contribHtml}
    ${G.round%PERK_INTERVAL===0&&me.alive?'<div class="rDetail" style="color:#ffd200;">🎲 肉鸽技能选择即将触发!</div>':''}
    ${G.round%3===0&&me.alive?'<div class="rDetail" style="color:#a855f7;">⚡ 随机事件即将触发!</div>':''}
    <button onclick="afterResult()">继续</button>`;
}

function afterResult(){
  document.getElementById('resultOverlay').style.display='none';
  let me=G.players[G.myIdx];
  if(!me.alive){showFinal();return;}
  let alive=G.players.filter(p=>p.alive);
  if(alive.length<=1){showFinal();return;}
  // 检测本轮淘汰的玩家（排除自己）
  let elimThisRound=G.players.filter(p=>!p.alive&&(G.aliveBeforeBattle||[]).includes(p.name)&&p!==me);
  if(elimThisRound.length>0){
    showElimAnimation(elimThisRound,function(){
      proceedAfterResult();
    });
  }else{
    proceedAfterResult();
  }
}
function proceedAfterResult(){
  let me=G.players[G.myIdx];
  // 每4回合选技能（肉鸽），每3回合触发随机事件（两者可叠加，先选技能再触发事件）
  if(G.round%PERK_INTERVAL===0){
    showPerkSelection(function(){
      if(G.round%3===0){triggerEvent();}
      else{nextRound();}
    });
  }else if(G.round%3===0){triggerEvent();}
  else{nextRound();}
}

// ============== 淘汰动画 ==============
function showElimAnimation(elimPlayers,onDone){
  const o=document.getElementById('elimOverlay');

function closeElimAnimation(){

  G._elimCallback=null;
  if(cb)cb();
}

// ============== 事件系统 ==============
function triggerEvent(){
  let me=G.players[G.myIdx];
  const actionCost={buyRare:8,buyEpic:12,buyCommonLv2:4,bargain:3,buyWeapon:7,buyDefense:6,buy2Common:5,upgrade2:10,randomBless:4,buyRandLv2:6,heal30:10,upgradeItem:6,gamble:5};
  const freeActions=new Set(['none','sellHp','steal','heal8','heal15','sellHp20','explore','loot','gift','giftGold']);
  // 不再过滤选项，而是标记哪些买得起
  let available=[...EVENTS];
  if(available.length===0){nextRound();return;}
  let ev=available[Math.floor(Math.random()*available.length)];
  const o=document.getElementById('eventOverlay');o.style.display='flex';
  const b=document.getElementById('eventBox');
  let h='<h2>🌟 '+ev.name+'</h2><div class="eDesc">'+ev.desc+'</div><div class="eventOpts">';
  ev.opts.forEach((op,i)=>{
    let isFree=freeActions.has(op.action);
    let need=actionCost[op.action]||0;
    let canAfford=isFree||need===0||me.gold>=need;
    if(canAfford){
      h+=`<div class="eventOpt" onclick="resolveEvent('${op.action}')"><div class="eoName">${op.name}</div><div class="eoDesc">${op.desc}</div></div>`;
    }else{
      h+=`<div class="eventOpt disabled"><div class="eoName" style="color:#666;">${op.name}</div><div class="eoDesc" style="color:#555;">${op.desc} <span style="color:#f44;">(需${need}💰)</span></div></div>`;
    }
  });
  h+='</div>';b.innerHTML=h;
}
function giveItemToPlayer(me,item){
  // 通用: 给玩家一个道具，自动检查背包/仓库/合成
  let usedSlots=me.items.reduce((s,x)=>s+(x?x.size||1:0),0);
  if(usedSlots+(item.size||1)>G.maxSlots&&!canMergeWith(me,item)&&!canMergeWithStorage(me,item)){
    if(me.storage.length<G.maxStorage){me.storage.push({...item});floatMsg('获得 '+item.icon+item.name+' → 仓库','#4df');return true;}
    else{floatMsg('背包和仓库都满了!','#f44');return false;}
  }
  me.items.push({...item});checkMerge(me);floatMsg('获得 '+item.icon+item.name,'#4f4');return true;
}
function resolveEvent(action){
  document.getElementById('eventOverlay').style.display='none';
  let me=G.players[G.myIdx];
  switch(action){
    case'buyRare':if(me.gold>=8){me.gold-=8;let rares=ITEMS_DB.filter(x=>x.rarity==='rare'||x.rarity==='epic');let pick=rares[Math.floor(Math.random()*rares.length)];if(!giveItemToPlayer(me,{...pick,lv:1}))me.gold+=8;}else{floatMsg('金币不足!','#f44');}break;
    case'buyEpic':if(me.gold>=12){me.gold-=12;let epics=ITEMS_DB.filter(x=>x.rarity==='epic'||x.rarity==='legend');let pick=epics[Math.floor(Math.random()*epics.length)];if(!giveItemToPlayer(me,{...pick,lv:1}))me.gold+=12;}else{floatMsg('金币不足!','#f44');}break;
    case'buyCommonLv2':if(me.gold>=4){me.gold-=4;let commons=ITEMS_DB.filter(x=>x.rarity==='common');let pick=commons[Math.floor(Math.random()*commons.length)];if(!giveItemToPlayer(me,{...pick,lv:2}))me.gold+=4;}else{floatMsg('金币不足!','#f44');}break;
    case'bargain':if(me.gold>=3){if(Math.random()<0.5){let rares=ITEMS_DB.filter(x=>x.rarity==='rare');let pick=rares[Math.floor(Math.random()*rares.length)];giveItemToPlayer(me,{...pick,lv:1});floatMsg('讨价还价成功!','#4f4');}else{me.gold-=3;floatMsg('讨价还价失败! -3💰','#f44');}}else{floatMsg('金币不足!','#f44');}break;
    case'buyWeapon':if(me.gold>=7){me.gold-=7;let weapons=ITEMS_DB.filter(x=>x.type==='weapon'&&(x.rarity==='rare'||x.rarity==='epic'));let pick=weapons[Math.floor(Math.random()*weapons.length)];if(!giveItemToPlayer(me,{...pick,lv:1}))me.gold+=7;}else{floatMsg('金币不足!','#f44');}break;
    case'buyDefense':if(me.gold>=6){me.gold-=6;let defs=ITEMS_DB.filter(x=>(x.type==='shield'||x.type==='heal')&&x.rarity!=='common');let pick=defs[Math.floor(Math.random()*defs.length)];if(!giveItemToPlayer(me,{...pick,lv:1}))me.gold+=6;}else{floatMsg('金币不足!','#f44');}break;
    case'buy2Common':if(me.gold>=5){me.gold-=5;let commons=ITEMS_DB.filter(x=>x.rarity==='common');for(let i=0;i<2;i++){let pick=commons[Math.floor(Math.random()*commons.length)];giveItemToPlayer(me,{...pick,lv:1});}floatMsg('获得2件普通道具!','#4f4');}else{floatMsg('金币不足!','#f44');}break;
    case'upgrade2':if(me.gold>=10&&me.items.length>=2){me.gold-=10;let idxs=[...me.items.keys()];for(let i=0;i<Math.min(2,idxs.length);i++){let r=Math.floor(Math.random()*idxs.length);let idx=idxs.splice(r,1)[0];me.items[idx].lv=(me.items[idx].lv||1)+1;floatMsg(me.items[idx].name+' → Lv'+me.items[idx].lv,'#a855f7');}}else{floatMsg(me.gold<10?'金币不足!':'物品不足!','#f44');}break;
    case'randomBless':if(me.gold>=4){me.gold-=4;if(Math.random()<0.5){me.hp=Math.min(me.maxHp,me.hp+10);floatMsg('🙏 祝福: +10 HP','#4f4');}else{me.gold+=3;floatMsg('🙏 祝福: +3💰','#ffd200');}}else{floatMsg('金币不足!','#f44');}break;
    case'buyRandLv2':if(me.gold>=6){me.gold-=6;let all=ITEMS_DB.filter(x=>x.rarity==='common'||x.rarity==='rare');let pick=all[Math.floor(Math.random()*all.length)];if(!giveItemToPlayer(me,{...pick,lv:2}))me.gold+=6;}else{floatMsg('金币不足!','#f44');}break;
    case'explore':if(Math.random()<0.5){let legends=ITEMS_DB.filter(x=>x.rarity==='legend');let pick=legends[Math.floor(Math.random()*legends.length)];giveItemToPlayer(me,{...pick,lv:1});floatMsg('🎉 发现传说道具!','#ffd200');}else{me.hp=Math.max(1,me.hp-15);floatMsg('洞穴坍塌! -15HP','#f44');}break;
    case'loot':{let g=3+Math.floor(Math.random()*6);me.gold+=g;floatMsg('+'+g+'💰 搜刮所得','#ffd200');}break;
    case'heal30':if(me.gold>=10){me.gold-=10;me.hp=Math.min(me.maxHp,me.hp+30);floatMsg('🙏 +30 HP','#4f4');}else{floatMsg('金币不足!','#f44');}break;
    case'sellHp20':me.hp=Math.max(1,me.hp-20);me.gold+=10;floatMsg('-20HP +10💰','#ffd200');break;
    case'heal8':me.hp=Math.min(me.maxHp,me.hp+8);floatMsg('+8 HP','#4f4');break;
    case'gift':{let r=Math.random();if(r<0.33){me.gold+=5;floatMsg('🎁 礼物: +5💰','#ffd200');}else if(r<0.66){me.hp=Math.min(me.maxHp,me.hp+12);floatMsg('🎁 礼物: +12HP','#4f4');}else{let all=ITEMS_DB.filter(x=>x.rarity==='common'||x.rarity==='rare');let pick=all[Math.floor(Math.random()*all.length)];giveItemToPlayer(me,{...pick,lv:1});}}break;
    case'giftGold':me.gold+=3;floatMsg('+3💰 路费','#ffd200');break;
    case'sellHp':me.hp=Math.max(1,me.hp-10);me.gold+=6;floatMsg('-10HP +6💰','#ffd200');break;
    case'upgradeItem':if(me.gold>=6&&me.items.length>0){me.gold-=6;let idx=Math.floor(Math.random()*me.items.length);me.items[idx].lv=(me.items[idx].lv||1)+1;floatMsg(me.items[idx].name+' 升级到 Lv'+me.items[idx].lv,'#a855f7');}else{floatMsg(me.gold<6?'金币不足!':'没有物品!','#f44');}break;
    case'heal15':me.hp=Math.min(me.maxHp,me.hp+15);floatMsg('+15 HP','#4f4');break;
    case'gamble':if(me.gold>=5){if(Math.random()<0.5){me.gold+=12;floatMsg('+12💰 赢了!','#ffd200');}else{me.gold-=5;floatMsg('-5💰 输了!','#f44');}}else{floatMsg('金币不足!','#f44');}break;
    case'steal':me.gold+=3;me.hp=Math.max(1,me.hp-5);floatMsg('+3💰 -5HP','#ffd200');break;
    case'none':break;
  }
  G.gold=me.gold;updateTopBar();renderBoard();renderStorage();
  nextRound();
}

// ============== 肉鸽技能选择 ==============
function rollPerks(player,count){
  // 从技能池中随机选count个不重复的（排除已拥有的同id技能，允许不同id）
  let owned=new Set((player.perks||[]).map(p=>p.id));
  let pool=PERKS.filter(p=>!owned.has(p.id));
  // 如果可选不够，允许重复拿（叠加效果）
  if(pool.length<count)pool=[...PERKS];
  let res=[];
  let tempPool=[...pool];
  for(let i=0;i<count&&tempPool.length>0;i++){
    let idx=Math.floor(Math.random()*tempPool.length);
    res.push(tempPool[idx]);
    tempPool.splice(idx,1);
  }
  return res;
}

function showPerkSelection(onDone){
  let me=G.players[G.myIdx];
  // AI玩家也获得随机技能
  G.players.forEach((p,i)=>{
    if(p.ai&&p.alive){
      let pick=rollPerks(p,1)[0];
      if(pick)p.perks.push({...pick});
    }
  });
  let choices=rollPerks(me,3);
  if(choices.length===0){if(onDone)onDone();return;}
  const o=document.getElementById('perkOverlay');o.style.display='flex';
  const b=document.getElementById('perkBox');
  const tierColors={1:'#4ade80',2:'#60a5fa',3:'#c084fc'};
  const tierNames={1:'普通',2:'稀有',3:'史诗'};
  const catIcons={attack:'⚔️',defense:'🛡️',support:'💫'};
  const catNames={attack:'攻击',defense:'防御',support:'辅助'};
  let h=`<h2 style="color:#ffd200;font-size:22px;margin-bottom:4px;">🎲 肉鸽技能</h2>`;
  h+=`<div style="font-size:12px;color:#aaa;margin-bottom:16px;">第 ${G.round} 回合 — 选择一项永久技能增强</div>`;
  h+=`<div style="font-size:10px;color:#888;margin-bottom:12px;">已拥有 ${me.perks.length} 个技能</div>`;
  h+=`<div class="perkChoices">`;
  choices.forEach((pk,i)=>{
    let tClr=tierColors[pk.tier]||'#aaa';
    let tName=tierNames[pk.tier]||'';
    let catIcon=catIcons[pk.category]||'';
    let catName=catNames[pk.category]||'';
    h+=`<div class="perkCard tier${pk.tier}" onclick="choosePerk(${i})">
      <div class="pkTier" style="color:${tClr};">${tName}</div>
      <div class="pkIcon">${pk.icon}</div>
      <div class="pkName">${pk.name}</div>
      <div class="pkCat">${catIcon} ${catName}</div>
      <div class="pkDesc">${pk.desc}</div>
    </div>`;
  });
  h+=`</div>`;
  // 已拥有技能列表
  if(me.perks.length>0){
    h+=`<div class="ownedPerks">`;
    h+=`<div style="font-size:10px;color:#888;margin-bottom:4px;">📜 已有技能:</div>`;
    h+=`<div style="display:flex;flex-wrap:wrap;gap:4px;justify-content:center;">`;
    me.perks.forEach(pk=>{
      h+=`<span style="font-size:10px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:6px;padding:2px 6px;">${pk.icon}${pk.name}</span>`;
    });
    h+=`</div></div>`;
  }
  b.innerHTML=h;
  // 存储选择和回调
  G._perkChoices=choices;
  G._perkCallback=onDone;
}

function choosePerk(idx){
  let me=G.players[G.myIdx];
  let pk=G._perkChoices[idx];
  if(!pk)return;
  me.perks.push({...pk});
  document.getElementById('perkOverlay').style.display='none';
  floatMsg('🎲 获得技能: '+pk.icon+pk.name,'#ffd200');
  let cb=G._perkCallback;
  G._perkChoices=null;G._perkCallback=null;
  if(cb)cb();
}

// 从perks计算综合加成
function getPerkBuffs(player){
  let b={dmgMul:0,critRate:0,critDmg:0,cdMul:0,shieldMul:0,healMul:0,dotMul:0,
          regenPerSec:0,thornsPct:0,maxHpBonus:0,executeDmg:0,armorPen:0,
          lastStandBoost:0,dotDecay:0,goldPerRound:0,buffBoost:0,allBoost:0,
          winGold:0,globalLifesteal:0,damageTaken:0};
  (player.perks||[]).forEach(pk=>{
    let e=pk.effect;
    if(e.dmgMul)b.dmgMul+=e.dmgMul;
    if(e.critRate)b.critRate+=e.critRate;
    if(e.critDmg)b.critDmg+=e.critDmg;
    if(e.cdMul)b.cdMul+=e.cdMul;
    if(e.shieldMul)b.shieldMul+=e.shieldMul;
    if(e.healMul)b.healMul+=e.healMul;
    if(e.dotMul)b.dotMul+=e.dotMul;
    if(e.regenPerSec)b.regenPerSec+=e.regenPerSec;
    if(e.thornsPct)b.thornsPct+=e.thornsPct;
    if(e.maxHpBonus)b.maxHpBonus+=e.maxHpBonus;
    if(e.executeDmg)b.executeDmg+=e.executeDmg;
    if(e.armorPen)b.armorPen+=e.armorPen;
    if(e.lastStandBoost)b.lastStandBoost+=e.lastStandBoost;
    if(e.dotDecay)b.dotDecay+=e.dotDecay;
    if(e.goldPerRound)b.goldPerRound+=e.goldPerRound;
    if(e.buffBoost)b.buffBoost+=e.buffBoost;
    if(e.allBoost)b.allBoost+=e.allBoost;
    if(e.winGold)b.winGold+=e.winGold;
    if(e.globalLifesteal)b.globalLifesteal+=e.globalLifesteal;
    if(e.damageTaken)b.damageTaken+=e.damageTaken;
  });
  return b;
}

// ============== 最终排名 ==============
function showFinal(){
  document.getElementById('resultOverlay').style.display='none';
  document.getElementById('gameUI').style.display='none';
  const f=document.getElementById('finalScreen');f.style.display='flex';
  // 排名: 存活者第1，然后按淘汰倒序
  let ranking=[];
  let alive=G.players.filter(p=>p.alive);
  ranking.push(...alive);
  for(let i=G.elimOrder.length-1;i>=0;i--)ranking.push(G.elimOrder[i]);
  let myRank=ranking.indexOf(G.players[G.myIdx])+1;
  document.getElementById('finalTitle').textContent=myRank===1?'🏆 大巴扎之王!':'第 '+myRank+' 名';
  document.getElementById('finalTitle').style.color=myRank===1?'#ffd200':myRank<=3?'#4f4':'#f88';
  const list=document.getElementById('rankList');list.innerHTML='';
  ranking.forEach((p,i)=>{
    let li=document.createElement('li');
    li.className=p===G.players[G.myIdx]?'me':'';
    li.textContent='#'+(i+1)+' '+p.name+' ('+p.wins+'胜'+p.losses+'负)';
    list.appendChild(li);
  });
}

// ============== UI辅助 ==============
function updateTopBar(){
  let me=G.players[G.myIdx];
  document.getElementById('roundText').textContent='第 '+G.round+' 回合';
  document.getElementById('goldText').textContent=me.gold;
  document.getElementById('hpText').textContent=Math.ceil(me.hp);
  document.getElementById('hpText').parentElement.querySelector('.hpVal').style.color=me.hp<30?'#f44':'#4f4';
  document.getElementById('lvlText').textContent='⭐ Lv.'+me.lv+' ('+Math.floor(me.xp)+'/'+me.xpNeed+')';
  // 职业特性
  let h=me.hero;
  document.getElementById('heroTrait').innerHTML=h.icon+' '+h.name+' <span style="color:#ccc;font-size:10px;">'+h.desc+'</span>';
  // 技能数
  let perkEl=document.getElementById('perksText');
  if(perkEl){
    let pks=me.perks||[];
    if(pks.length>0){
      perkEl.innerHTML='🎲'+pks.length+'技能';
      perkEl.title=pks.map(p=>p.icon+p.name+': '+p.desc).join('\n');
      perkEl.style.display='';
    }else{perkEl.style.display='none';}
  }
}
function updatePlayersPanel(){
  const c=document.getElementById('playersPanel');c.innerHTML='';
  // 排序: 存活在前，HP高在前
  let sorted=[...G.players].sort((a,b)=>(b.alive-a.alive)||(b.hp-a.hp));
  sorted.forEach(p=>{
    let d=document.createElement('div');
    d.className='pCard'+(p===G.players[G.myIdx]?' me':'')+(p.alive?'':' dead');
    d.innerHTML=`<div class="pName">${p.hero.icon} ${p.name}</div>
      <div style="font-size:9px;color:#aa8;margin:1px 0;opacity:.7;">${p.hero.desc}</div>
      <div class="pHp${p.hp<30?' low':''}">${p.alive?'❤️'+Math.ceil(p.hp)+'/'+p.maxHp:'💀 已淘汰'}</div>
      <div class="pWin">${p.wins}胜 ${p.losses}负 | Lv.${p.lv}${(p.perks||[]).length>0?' | 🎲'+p.perks.length:''}</div>`;
    c.appendChild(d);
  });
}
function showTooltip(e,it,fromBag){
  const t=document.getElementById('tooltip');
  let lv=it.lv||1;let lvMul=1+(lv-1)*0.5;
  let stats='';
  if(it.dmg){let val=Math.ceil(it.dmg*lvMul);stats+=`伤害: ${val}${lv>1?' <span style="color:#4f4;">(基础${it.dmg}×${lvMul.toFixed(1)})</span>':''} | CD: ${it.cd}s\n`;}
  if(it.shield){let val=Math.ceil(it.shield*lvMul);stats+=`护盾: ${val}${lv>1?' <span style="color:#4df;">(基础${it.shield}×${lvMul.toFixed(1)})</span>':''} | CD: ${it.cd}s\n`;}
  if(it.heal){let val=Math.ceil(it.heal*lvMul);stats+=`治疗: ${val}${lv>1?' <span style="color:#4f4;">(基础${it.heal}×${lvMul.toFixed(1)})</span>':''} | CD: ${it.cd}s\n`;}
  if(it.burnDmg){let val=Math.ceil(it.burnDmg*lvMul);stats+=`灼烧: ${val}/层${lv>1?' <span style="color:#fa0;">(基础${it.burnDmg}×${lvMul.toFixed(1)})</span>':''} x${it.burnStack}层\n`;}
  if(it.poisonDmg){let val=Math.ceil(it.poisonDmg*lvMul);stats+=`毒素: ${val}/层${lv>1?' <span style="color:#c4f;">(基础${it.poisonDmg}×${lvMul.toFixed(1)})</span>':''} x${it.poisonStack}层\n`;}
  if(it.buffVal){let val=it.buffVal*lv;stats+=`增益: +${(val*100).toFixed(0)}%${lv>1?' <span style="color:#ff0;">(基础${(it.buffVal*100).toFixed(0)}%×Lv${lv})</span>':''}\n`;}
  if(it.remoteDmg){let val=Math.ceil(it.remoteDmg*lvMul);stats+=`<span style="color:#f44;">💥 引爆伤害: ${val}</span>${lv>1?' <span style="color:#fa0;">(基础${it.remoteDmg}×${lvMul.toFixed(1)})</span>':''}\n<span style="color:#f97;">🧱 炸墙: 无视50%护盾 + 摧毁40%护盾</span> | 每场1次\n`;}
  if(it.wallBreakPct&&!it.siegeDmg){stats+=`<span style="color:#f97;">🏗️ 破盾: ${Math.ceil(it.wallBreakPct*100)}%护盾</span> | CD: ${it.cd}s\n`;}
  if(it.siegeDmg){let val=Math.ceil(it.siegeDmg*lvMul);stats+=`<span style="color:#f44;">💣 炸弹伤害: ${val} + 摧毁全部护盾</span> | CD: ${it.cd}s\n`;}
  if(it.freezeTime){stats+=`<span style="color:#67e8f9;">❄️ 冻结: ${it.freezeTime}s</span> | CD: ${it.cd}s\n`;}
  if(it.reflectPct){stats+=`<span style="color:#c8f;">🪞 反弹: ${Math.ceil(it.reflectPct*100)}%</span> | CD: ${it.cd}s\n`;}
  if(it.size)stats+=`大小: ${it.size}格`;
  let typeStr=TYPE_LABEL[it.type]||it.type;
  let typeClr=TYPE_COLOR[it.type]||'#aaa';
  let sellHtml='';
  if(fromBag){
    let refund=Math.floor(it.cost*0.5*(it.lv||1));
    sellHtml=`<div style="margin-top:6px;padding-top:5px;border-top:1px solid rgba(255,255,255,.1);font-size:11px;color:#ffd200;">💰 卖出价: <span style="font-weight:bold;">${refund}金币</span> <span style="font-size:9px;color:#888;">(原价${it.cost} × 50% × Lv${it.lv||1})</span></div>`;
  }
  t.innerHTML=`<div class="tName">${it.icon} ${it.name} (Lv${it.lv||1})</div><div style="font-size:10px;color:${typeClr};margin-bottom:3px;">${typeStr}</div><div class="tDesc">${it.desc}</div><div class="tStats">${stats}</div>${sellHtml}`;
  t.style.display='block';t.style.left=Math.min(e.clientX+12,innerWidth-260)+'px';t.style.top=Math.min(e.clientY+12,innerHeight-150)+'px';
}
function hideTooltip(){document.getElementById('tooltip').style.display='none';}
// 修复tooltip不消失bug：全局mousemove检测
let _tooltipTarget=null;
document.addEventListener('mousemove',function(e){
  let t=document.getElementById('tooltip');
  if(t.style.display==='none')return;
  // 检查鼠标是否还在触发tooltip的元素上
  let el=document.elementFromPoint(e.clientX,e.clientY);
  if(!el)return hideTooltip();
  let found=el.closest('.shopItem,.slot.filled,.storageSlot.filled');
  if(!found)hideTooltip();
  else{t.style.left=Math.min(e.clientX+12,innerWidth-260)+'px';t.style.top=Math.min(e.clientY+12,innerHeight-150)+'px';}
});
function floatMsg(txt,color){
  let d=document.createElement('div');d.className='floatNum';d.textContent=txt;d.style.color=color||'#fff';
  d.style.left='50%';d.style.top='45%';d.style.transform='translateX(-50%)';
  document.body.appendChild(d);setTimeout(()=>d.remove(),900);
}
</script>
