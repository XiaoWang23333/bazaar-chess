<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大巴扎 + 自走棋</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Microsoft YaHei',sans-serif;background:#0a0a1a;color:#fff;overflow:hidden;height:100vh;user-select:none;}
canvas#bgCanvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;}
/* 开始界面 */
#startScreen{position:fixed;inset:0;z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;background:radial-gradient(ellipse at center,rgba(20,15,40,.9),rgba(5,5,15,.98) 70%);}
#startScreen h1{font-size:64px;background:linear-gradient(135deg,#f7971e,#ffd200,#e44d26,#ff6b6b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-shadow:0 0 40px rgba(255,180,0,.3);margin-bottom:8px;letter-spacing:4px;}
#startScreen .sub{font-size:20px;color:#aaa;margin-bottom:40px;letter-spacing:2px;}
.heroSelect{display:flex;gap:16px;margin-bottom:36px;flex-wrap:wrap;justify-content:center;}
.heroCard{width:130px;padding:16px 10px;border-radius:14px;border:2px solid #333;background:rgba(30,30,60,.8);cursor:pointer;text-align:center;transition:.3s;}
.heroCard:hover,.heroCard.sel{border-color:#ffd200;box-shadow:0 0 20px rgba(255,210,0,.3);transform:translateY(-4px);}
.heroCard .icon{font-size:48px;margin-bottom:6px;}
.heroCard .hname{font-size:15px;font-weight:bold;color:#ffd200;}
.heroCard .hdesc{font-size:11px;color:#999;margin-top:4px;line-height:1.3;}
#btnStart{padding:14px 56px;font-size:22px;border:none;border-radius:30px;background:linear-gradient(135deg,#f7971e,#ffd200);color:#1a1a2e;font-weight:bold;cursor:pointer;letter-spacing:2px;transition:.3s;}
#btnStart:hover{transform:scale(1.05);box-shadow:0 0 30px rgba(255,200,0,.5);}
/* 游戏主界面 */
#gameUI{display:none;position:fixed;inset:0;z-index:100;flex-direction:column;}
/* 顶部状态栏 */
.topBar{height:48px;background:rgba(10,10,30,.95);display:flex;align-items:center;padding:0 16px;gap:12px;border-bottom:1px solid #222;flex-shrink:0;z-index:10;}
.topBar .round{color:#ffd200;font-size:16px;font-weight:bold;}
.topBar .gold{color:#ffd200;font-size:15px;}
.topBar .gold em{font-style:normal;font-size:18px;}
.topBar .hp{font-size:15px;}
.topBar .hp .hpVal{color:#4f4;font-weight:bold;}
.topBar .phase{margin-left:auto;font-size:14px;color:#aaa;background:rgba(255,255,255,.08);padding:4px 14px;border-radius:12px;}
/* 玩家状态面板 */
.playersPanel{width:180px;background:rgba(10,10,30,.9);border-right:1px solid #222;overflow-y:auto;flex-shrink:0;padding:8px;}
.pCard{padding:8px;border-radius:8px;margin-bottom:4px;background:rgba(255,255,255,.04);border:1px solid transparent;cursor:pointer;transition:.2s;}
.pCard:hover{background:rgba(255,255,255,.08);}
.pCard.dead{opacity:.4;}
.pCard.me{border-color:#ffd200;}
.pCard .pName{font-size:12px;font-weight:bold;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pCard .pHp{font-size:11px;color:#4f4;margin-top:2px;}
.pCard .pHp.low{color:#f44;}
.pCard .pWin{font-size:10px;color:#aaa;}
/* 中间内容区 */
.midArea{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative;}
/* 商店阶段 */
#shopPhase{flex:1;display:flex;flex-direction:column;padding:12px;overflow:hidden;}
.shopTitle{font-size:16px;color:#ffd200;margin-bottom:8px;display:flex;align-items:center;gap:10px;}
.shopTitle .timer{color:#f88;font-size:14px;margin-left:auto;}
.shopItems{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px;min-height:90px;max-height:220px;overflow-y:auto;padding-right:4px;}
.shopItems::-webkit-scrollbar{width:4px;}
.shopItems::-webkit-scrollbar-thumb{background:#444;border-radius:4px;}
.shopItems::-webkit-scrollbar-track{background:transparent;}
.shopItem{width:110px;padding:10px;border-radius:10px;border:2px solid #333;background:rgba(30,30,60,.85);cursor:pointer;text-align:center;transition:.25s;position:relative;}
.shopItem.size2{width:160px;min-height:110px;}
.shopItem.size2 .sIcon{font-size:42px;}
.shopItem.size3{width:200px;min-height:120px;}
.shopItem.size3 .sIcon{font-size:48px;}
.shopItem:hover{border-color:#4d96ff;transform:translateY(-3px);box-shadow:0 4px 16px rgba(77,150,255,.3);}
.shopItem.canMerge{border-color:#ffd200;box-shadow:0 0 10px rgba(255,210,0,.2);}
.shopItem.canMerge:hover{border-color:#ffd200;box-shadow:0 4px 20px rgba(255,210,0,.4);}
.shopItem .sIcon{font-size:32px;}
.shopItem .sName{font-size:11px;font-weight:bold;margin:4px 0 2px;color:#fff;}
.shopItem .sDesc{font-size:9px;color:#aaa;line-height:1.2;min-height:28px;}
.shopItem .sCost{position:absolute;top:4px;right:6px;font-size:11px;color:#ffd200;font-weight:bold;}
.shopItem .sRarity{position:absolute;top:4px;left:6px;font-size:9px;padding:1px 5px;border-radius:6px;}
.r-common .sRarity{background:#555;color:#ccc;}
.r-rare .sRarity{background:#2563eb;color:#bdf;}
.r-epic .sRarity{background:#7c3aed;color:#dbb4fe;}
.r-legend .sRarity{background:#d97706;color:#fde68a;}
.shopBtns{display:flex;gap:10px;margin-bottom:12px;}
.shopBtns button{padding:8px 20px;border:none;border-radius:8px;font-size:13px;cursor:pointer;font-weight:bold;transition:.2s;}
.btnRefresh{background:#2563eb;color:#fff;}
.btnRefresh:hover{background:#3b82f6;}
.btnFreeze{background:#444;color:#fff;}
.btnFreeze:hover{background:#555;}
.sellZone{width:100%;min-height:60px;border:3px dashed #444;border-radius:12px;display:flex;align-items:center;justify-content:center;color:#555;font-size:14px;transition:.3s;margin-top:8px;background:rgba(20,10,10,.3);}
.sellZone.dragover{border-color:#f44;background:rgba(220,38,38,.15);color:#f88;box-shadow:0 0 20px rgba(220,38,38,.3);}
.sellZone .sellIcon{font-size:28px;margin-right:8px;}
.btnReady{background:linear-gradient(135deg,#10b981,#34d399);color:#fff;margin-left:auto;padding:8px 28px;}
.btnReady:hover{box-shadow:0 0 16px rgba(16,185,129,.5);}
.btnExpand{background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff;font-weight:bold;}
.btnExpand:hover{box-shadow:0 0 12px rgba(245,158,11,.5);}
.btnExpand.maxed{background:#333;color:#666;cursor:not-allowed;}
/* 物品槽 */
.myBoard{display:flex;flex-direction:column;gap:8px;margin-top:auto;padding-top:8px;border-top:1px solid #222;}
.boardLabel{font-size:12px;color:#888;}
.boardSlots{display:flex;gap:6px;flex-wrap:wrap;}
.slot{width:80px;height:80px;border-radius:10px;border:2px dashed #333;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:.2s;position:relative;background:rgba(20,20,50,.6);}
.slot.size2{width:166px;}
.slot.size3{width:252px;}
.slot.size2 .slIcon{font-size:34px;}
.slot.size3 .slIcon{font-size:40px;}
.slot .slSize{position:absolute;bottom:2px;right:4px;font-size:8px;color:#888;}
.slot:hover{border-color:#ffd200;}
.slot.filled{border-style:solid;border-color:#444;background:rgba(30,30,70,.8);}
.slot.filled.sr-common{border-color:#666;background:rgba(40,40,65,.85);}
.slot.filled.sr-rare{border-color:#2563eb;background:rgba(25,35,75,.85);}
.slot.filled.sr-epic{border-color:#7c3aed;background:rgba(40,25,70,.85);}
.slot.filled.sr-legend{border-color:#d97706;background:rgba(55,40,30,.85);box-shadow:0 0 10px rgba(217,119,6,.25);}
.slot .slIcon{font-size:26px;}
.slot .slName{font-size:9px;color:#ccc;margin-top:2px;text-align:center;max-width:70px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.slot .slLv{position:absolute;top:2px;right:4px;font-size:9px;color:#ffd200;}
.slot .slRarity{position:absolute;top:2px;left:4px;font-size:8px;padding:0 4px;border-radius:4px;line-height:14px;}
.slot .slRarity.rc{background:#555;color:#ccc;}
.slot .slRarity.rr{background:#2563eb;color:#bdf;}
.slot .slRarity.re{background:#7c3aed;color:#dbb4fe;}
.slot .slRarity.rl{background:#d97706;color:#fde68a;}
.slot.selected{border-color:#f44;box-shadow:0 0 12px rgba(255,50,50,.4);}
.slot.dragging{opacity:.4;transform:scale(.9);}
/* 战斗阶段 */
#battlePhase{display:none;flex:1;flex-direction:column;padding:12px;overflow:hidden;}
.battleInfo{text-align:center;margin-bottom:10px;}
.battleInfo .vs{font-size:22px;color:#ffd200;font-weight:bold;}
.battleField{flex:1;display:flex;justify-content:space-between;align-items:center;gap:20px;padding:0 20px;}
.bSide{flex:1;max-width:400px;}
.bSide h3{font-size:14px;margin-bottom:6px;text-align:center;}
.bSide h3.left{color:#4d96ff;}
.bSide h3.right{color:#f44;}
.bItems{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;}
.bItem{width:68px;height:68px;border-radius:8px;border:2px solid #444;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:22px;position:relative;background:rgba(20,20,50,.8);transition:.3s;}
.bItem.active{border-color:#ffd200;box-shadow:0 0 14px rgba(255,210,0,.4);animation:pulse .5s;}
.bItem .cdBar{position:absolute;bottom:0;left:0;height:3px;background:#ffd200;border-radius:0 0 6px 6px;transition:width .1s linear;}
.bItem .bombBtn{transition:.2s;}
.bItem .bombBtn:hover{filter:brightness(1.3);transform:scaleY(1.2);}
.bItem.bomb-detonated{background:rgba(220,38,38,.2)!important;border-color:#f44!important;}
@keyframes bombExplode{0%{transform:scale(1);}30%{transform:scale(1.4);}60%{transform:scale(0.8);}100%{transform:scale(1);}}
.bItem.bomb-exploding{animation:bombExplode .5s ease-out;}
.bItem .biName{font-size:8px;color:#aaa;position:absolute;bottom:5px;}
.bItem .biStat{position:absolute;top:1px;right:3px;font-size:8px;font-weight:bold;text-shadow:0 1px 2px #000;line-height:1;}
.bItem .biStat.sdmg{color:#f88;}
.bItem .biStat.sheal{color:#4f4;}
.bItem .biStat.sshield{color:#4df;}
.bItem .biStat.sdot{color:#fa0;}
.bItem .biStat.sutil{color:#c8f;}
.bItem .biStatTotal{position:absolute;top:1px;left:3px;font-size:7px;color:#888;text-shadow:0 1px 2px #000;}
.hpBarWrap{width:100%;height:18px;background:#222;border-radius:9px;overflow:hidden;margin:8px 0;}
.hpBar{height:100%;background:linear-gradient(90deg,#22c55e,#4ade80);border-radius:9px;transition:width .3s;position:relative;}
.hpBar.low{background:linear-gradient(90deg,#dc2626,#f87171);}
.hpText{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:bold;text-shadow:0 1px 2px #000;}
.battleLog{max-height:120px;overflow-y:auto;padding:8px;background:rgba(0,0,0,.3);border-radius:8px;margin-top:8px;}
.battleLog p{font-size:11px;color:#aaa;margin:2px 0;}
.battleLog .dmg{color:#f88;}
.battleLog .heal{color:#4f4;}
.battleLog .shield{color:#4df;}
/* 回合结算 */
#resultOverlay{display:none;position:fixed;inset:0;z-index:150;background:rgba(0,0,0,.7);justify-content:center;align-items:center;}
.resultBox{background:rgba(20,20,50,.95);border:2px solid #ffd200;border-radius:16px;padding:30px 50px;text-align:center;}
.resultBox h2{font-size:28px;margin-bottom:10px;}
.resultBox .rDetail{font-size:14px;color:#aaa;margin-bottom:6px;}
.resultBox button{margin-top:16px;padding:10px 36px;border:none;border-radius:20px;font-size:16px;cursor:pointer;background:linear-gradient(135deg,#ffd200,#f7971e);color:#1a1a2e;font-weight:bold;}
/* 最终排名 */
#finalScreen{display:none;position:fixed;inset:0;z-index:200;background:radial-gradient(ellipse at center,rgba(20,15,40,.95),rgba(5,5,15,.99) 70%);flex-direction:column;align-items:center;justify-content:center;}
#finalScreen h1{font-size:48px;color:#ffd200;margin-bottom:20px;}
.rankList{list-style:none;margin-bottom:30px;}
.rankList li{font-size:18px;padding:6px 30px;margin:4px 0;border-radius:8px;background:rgba(255,255,255,.05);}
.rankList li:first-child{background:linear-gradient(90deg,rgba(255,210,0,.2),transparent);color:#ffd200;font-size:22px;font-weight:bold;}
.rankList .me{border:1px solid #ffd200;}
#finalScreen button{padding:12px 40px;font-size:18px;border:none;border-radius:24px;background:linear-gradient(135deg,#ffd200,#f7971e);color:#1a1a2e;font-weight:bold;cursor:pointer;}
/* 提示 */
.tooltip{display:none;position:fixed;z-index:300;background:rgba(15,15,40,.96);border:1px solid #ffd200;border-radius:10px;padding:12px;max-width:240px;pointer-events:none;}
.tooltip .tName{font-size:14px;font-weight:bold;color:#ffd200;margin-bottom:4px;}
.tooltip .tDesc{font-size:11px;color:#bbb;line-height:1.4;}
.tooltip .tStats{font-size:11px;color:#8f8;margin-top:4px;}
@keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.08);}}
@keyframes floatUp{0%{opacity:1;transform:translateY(0);}100%{opacity:0;transform:translateY(-40px);}}
.floatNum{position:fixed;font-size:16px;font-weight:bold;animation:floatUp 1.2s forwards;pointer-events:none;z-index:999;text-shadow:0 2px 8px rgba(0,0,0,.8),0 0 4px rgba(0,0,0,.6);letter-spacing:1px;}
@keyframes mergeGlow{0%{box-shadow:0 0 0 rgba(255,210,0,0);transform:scale(1);}50%{box-shadow:0 0 30px rgba(255,210,0,.8);transform:scale(1.15);}100%{box-shadow:0 0 0 rgba(255,210,0,0);transform:scale(1);}}
.slot.merging{animation:mergeGlow .6s ease-out;}
.mergeNotice{position:fixed;top:80px;left:50%;transform:translateX(-50%);z-index:250;background:linear-gradient(135deg,rgba(255,210,0,.95),rgba(247,151,30,.95));color:#1a1a2e;padding:10px 28px;border-radius:20px;font-size:16px;font-weight:bold;pointer-events:none;animation:floatUp 1.5s forwards;letter-spacing:1px;}
/* 合成全屏动画 */
#mergeOverlay{display:none;position:fixed;inset:0;z-index:240;background:rgba(0,0,0,.6);justify-content:center;align-items:center;flex-direction:column;gap:12px;}
#mergeOverlay.active{display:flex;}
@keyframes mergeItemFlyL{0%{transform:translateX(-80px) scale(1);opacity:1;}50%{transform:translateX(0) scale(1.2);opacity:1;}100%{transform:translateX(0) scale(0);opacity:0;}}
@keyframes mergeItemFlyR{0%{transform:translateX(80px) scale(1);opacity:1;}50%{transform:translateX(0) scale(1.2);opacity:1;}100%{transform:translateX(0) scale(0);opacity:0;}}
@keyframes mergeResult{0%{transform:scale(0) rotate(-180deg);opacity:0;}60%{transform:scale(1.3) rotate(10deg);opacity:1;}80%{transform:scale(0.95) rotate(-3deg);}100%{transform:scale(1) rotate(0deg);opacity:1;}}
@keyframes mergeFlash{0%{opacity:0;transform:scale(.5);}40%{opacity:1;transform:scale(1.2);}100%{opacity:0;transform:scale(2);}}
@keyframes mergeStar{0%{opacity:1;transform:translate(0,0) scale(1);}100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(0);}}
.mergeItem{font-size:64px;text-shadow:0 0 20px rgba(255,210,0,.5);}
.mergeItem.fly-left{animation:mergeItemFlyL .6s ease-in forwards;}
.mergeItem.fly-right{animation:mergeItemFlyR .6s ease-in forwards;}
.mergeResultItem{font-size:80px;opacity:0;animation:mergeResult .7s ease-out .5s forwards;text-shadow:0 0 40px rgba(255,210,0,.8);}
.mergeResultName{font-size:20px;color:#ffd200;font-weight:bold;opacity:0;animation:mergeResult .5s ease-out .8s forwards;text-shadow:0 2px 8px rgba(0,0,0,.5);}
.mergeFlash{position:absolute;width:120px;height:120px;border-radius:50%;background:radial-gradient(circle,rgba(255,210,0,.8),transparent 70%);animation:mergeFlash .8s ease-out .4s forwards;opacity:0;pointer-events:none;}
.mergeStar{position:absolute;font-size:16px;animation:mergeStar .8s ease-out forwards;pointer-events:none;}
/* 道具类别标签 */
.sType{position:absolute;bottom:4px;left:6px;font-size:8px;padding:1px 5px;border-radius:4px;background:rgba(0,0,0,.4);}
.sType.t-weapon{color:#f88;}.sType.t-shield{color:#4df;}.sType.t-heal{color:#4f4;}
.sType.t-burn{color:#fa0;}.sType.t-poison{color:#c4f;}.sType.t-buff{color:#ff0;}
.sType.t-special{color:#c8f;}
.slType{position:absolute;bottom:14px;right:4px;font-size:7px;color:#888;background:rgba(0,0,0,.3);padding:0 3px;border-radius:3px;}
/* 冻结标记 */
.shopItem.frozen{border:2px solid #67e8f9;box-shadow:0 0 12px rgba(103,232,249,.3);position:relative;}
.shopItem.frozen::after{content:'❄️';position:absolute;top:4px;right:4px;font-size:14px;filter:drop-shadow(0 0 4px #67e8f9);}
.btnFreeze.active{background:#0ea5e9;color:#fff;box-shadow:0 0 12px rgba(14,165,233,.4);}
/* 仓库背包 */
.storageArea{margin-top:6px;border-top:1px solid #333;padding-top:6px;}
.storageLabel{font-size:11px;color:#888;display:flex;align-items:center;gap:6px;margin-bottom:4px;}
.storageLabel .stCount{color:#ffd200;font-weight:bold;}
.storageSlots{display:flex;gap:4px;flex-wrap:wrap;min-height:36px;}
.storageSlot{width:52px;height:52px;border-radius:8px;border:1px dashed #333;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:.2s;position:relative;background:rgba(20,20,40,.5);font-size:8px;}
.storageSlot.filled{border-style:solid;border-color:#555;background:rgba(25,25,55,.8);}
.storageSlot:hover{border-color:#ffd200;}
.storageSlot .ssIcon{font-size:18px;}
.storageSlot .ssName{font-size:7px;color:#aaa;max-width:48px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.storageSlot .ssLv{position:absolute;top:1px;right:3px;font-size:7px;color:#ffd200;}
.storageSlot.sr-common{border-color:#555;}
.storageSlot.sr-rare{border-color:#2563eb;}
.storageSlot.sr-epic{border-color:#7c3aed;}
.storageSlot.sr-legend{border-color:#d97706;box-shadow:0 0 6px rgba(217,119,6,.2);}
.storageSlot.selected{border-color:#4ade80;box-shadow:0 0 8px rgba(74,222,128,.4);}
.slot.selected-for-swap{border-color:#4ade80;box-shadow:0 0 8px rgba(74,222,128,.4);}
/* 战报贡献进度条 */
.contribBar{width:100%;height:14px;background:#222;border-radius:7px;overflow:hidden;display:flex;margin:2px 0;}
.contribBar .cbLeft{height:100%;background:linear-gradient(90deg,#4d96ff,#60a5fa);border-radius:7px 0 0 7px;transition:width .3s;}
.contribBar .cbRight{height:100%;background:linear-gradient(90deg,#f87171,#dc2626);border-radius:0 7px 7px 0;transition:width .3s;}
.contribEntry{display:flex;align-items:center;gap:4px;font-size:11px;margin:2px 0;}
.contribEntry .ceBar{flex:1;height:8px;background:#222;border-radius:4px;overflow:hidden;position:relative;}
.contribEntry .ceBarFill{height:100%;border-radius:4px;transition:width .3s;}
.contribEntry .ceVal{min-width:40px;text-align:right;font-weight:bold;}
/* 战斗计时器 */
.battleTimer{font-size:14px;color:#f88;text-align:center;margin:4px 0;}
.battleTimer .timeBar{width:100%;height:4px;background:#333;border-radius:2px;overflow:hidden;margin-top:3px;}
.battleTimer .timeBarFill{height:100%;background:linear-gradient(90deg,#4ade80,#ffd200,#f44);border-radius:2px;transition:width .1s linear;}
/* 事件选择 */
#eventOverlay{display:none;position:fixed;inset:0;z-index:160;background:rgba(0,0,0,.7);justify-content:center;align-items:center;}
.eventBox{background:rgba(20,20,50,.96);border:2px solid #a855f7;border-radius:16px;padding:28px 36px;text-align:center;max-width:500px;}
.eventBox h2{color:#a855f7;font-size:22px;margin-bottom:12px;}
.eventBox .eDesc{color:#aaa;font-size:13px;margin-bottom:18px;}
.eventOpts{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
.eventOpt{padding:12px 18px;border-radius:10px;border:2px solid #555;background:rgba(40,40,80,.8);cursor:pointer;text-align:center;min-width:120px;transition:.2s;}
.eventOpt:hover{border-color:#a855f7;background:rgba(60,40,100,.8);}
.eventOpt.disabled{opacity:.4;cursor:not-allowed;border-color:#333;pointer-events:none;}
.eventOpt .eoName{font-size:14px;font-weight:bold;color:#fff;}
.eventOpt .eoDesc{font-size:10px;color:#aaa;margin-top:4px;}
/* 肉鸽技能选择 */
#perkOverlay{display:none;position:fixed;inset:0;z-index:170;background:rgba(0,0,0,.8);justify-content:center;align-items:center;backdrop-filter:blur(4px);}
.perkBox{background:rgba(15,15,40,.97);border:2px solid #ffd200;border-radius:18px;padding:24px 30px;text-align:center;max-width:620px;width:90%;}
.perkChoices{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;}
.perkCard{position:relative;padding:18px 14px;border-radius:14px;border:2px solid #444;background:rgba(30,30,60,.9);cursor:pointer;text-align:center;min-width:150px;max-width:180px;flex:1;transition:.25s;overflow:hidden;}
.perkCard:hover{transform:translateY(-6px);box-shadow:0 8px 30px rgba(255,210,0,.2);}
.perkCard.tier1{border-color:#4ade80;}.perkCard.tier1:hover{border-color:#86efac;background:rgba(30,60,30,.9);}
.perkCard.tier2{border-color:#60a5fa;}.perkCard.tier2:hover{border-color:#93c5fd;background:rgba(30,40,80,.9);}
.perkCard.tier3{border-color:#c084fc;}.perkCard.tier3:hover{border-color:#d8b4fe;background:rgba(60,30,80,.9);}
.perkCard::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle,rgba(255,210,0,.05) 0%,transparent 70%);opacity:0;transition:.3s;pointer-events:none;}
.perkCard:hover::before{opacity:1;}
.pkTier{font-size:10px;font-weight:bold;margin-bottom:4px;letter-spacing:1px;}
.pkIcon{font-size:36px;margin:6px 0;}
.pkName{font-size:15px;font-weight:bold;color:#fff;margin-bottom:4px;}
.pkCat{font-size:10px;color:#aaa;margin-bottom:6px;}
.pkDesc{font-size:12px;color:#ccc;line-height:1.4;}
.ownedPerks{margin-top:14px;padding-top:10px;border-top:1px solid rgba(255,255,255,.1);}
/* 淘汰动画 */
#elimOverlay{display:none;position:fixed;inset:0;z-index:180;background:rgba(0,0,0,.85);justify-content:center;align-items:center;flex-direction:column;gap:16px;backdrop-filter:blur(4px);}
.elimTitle{font-size:28px;font-weight:bold;color:#f44;text-shadow:0 0 20px rgba(255,60,60,.5);animation:elimTitleIn .5s ease-out;}
@keyframes elimTitleIn{0%{opacity:0;transform:scale(0.5);}100%{opacity:1;transform:scale(1);}}
.elimList{display:flex;gap:20px;flex-wrap:wrap;justify-content:center;}
.elimCard{background:rgba(60,20,20,.9);border:2px solid #f44;border-radius:14px;padding:20px 24px;text-align:center;min-width:140px;opacity:0;animation:elimCardIn .6s ease-out forwards;}
@keyframes elimCardIn{0%{opacity:0;transform:translateY(30px) scale(0.8);}100%{opacity:1;transform:translateY(0) scale(1);}}
.elimIcon{font-size:40px;margin-bottom:6px;}
.elimName{font-size:14px;font-weight:bold;color:#f88;margin-bottom:4px;}
.elimRank{font-size:12px;color:#ffd200;}
.elimStats{font-size:10px;color:#888;margin-top:4px;}
.elimRemain{font-size:14px;color:#4f4;margin-top:8px;}
.elimBtn{margin-top:12px;padding:10px 30px;font-size:14px;border:none;border-radius:20px;background:linear-gradient(135deg,#f44,#c44);color:#fff;font-weight:bold;cursor:pointer;transition:.2s;}
.elimBtn:hover{box-shadow:0 0 16px rgba(255,60,60,.4);}
</style>

<body>
<canvas id="bgCanvas"></canvas>

<!-- 开始界面 -->
<div id="startScreen">
  <h1>大巴扎 · 自走棋</h1>

  <div class="heroSelect" id="heroSelect"></div>
  <button id="btnStart" onclick="startGame()">开始对战</button>
</div>

<!-- 游戏主界面 -->
<div id="gameUI">
  <div class="topBar">
    <span class="round" id="roundText">第 1 回合</span>
    <span class="gold">💰 <em id="goldText">10</em></span>
    <span class="hp">❤️ <span class="hpVal" id="hpText">100</span>/100</span>
    <span id="lvlText" style="font-size:13px;color:#a78bfa;">⭐ Lv.1 (0/2)</span>
    <span id="heroTrait" style="font-size:12px;color:#ffa;background:rgba(255,210,0,.12);padding:3px 10px;border-radius:10px;border:1px solid rgba(255,210,0,.2);"></span>
    <span id="perksText" style="display:none;font-size:12px;color:#ffd200;background:rgba(255,210,0,.1);padding:3px 10px;border-radius:10px;border:1px solid rgba(255,210,0,.15);cursor:help;" title=""></span>
    <span class="phase" id="phaseText">🛒 商店阶段</span>
  </div>
  <div style="flex:1;display:flex;overflow:hidden;">
    <div class="playersPanel" id="playersPanel"></div>
    <div class="midArea">
      <!-- 商店 -->
      <div id="shopPhase">
        <div class="shopTitle">🏪 巴扎商店 <span class="timer" id="shopTimer">剩余 45s</span></div>
        <div class="shopBtns">
          <button class="btnRefresh" onclick="refreshShop()">🔄 刷新 (1💰)</button>
          <button class="btnExpand" id="btnExpand" onclick="expandSlots()">📦 扩充格子 (<span id="expandCostText">6💰</span>)</button>
          <button class="btnFreeze" onclick="toggleFreeze()">❄️ 冻结</button>
          <button class="btnReady" onclick="readyUp()">⚔️ 准备就绪</button>
        </div>
        <div class="shopItems" id="shopItems"></div>
        <div class="myBoard">
          <div class="boardLabel" id="boardLabel">📦 我的物品栏 (0/4格已用) — 拖拽物品到下方出售</div>
          <div class="boardSlots" id="boardSlots"></div>
          <div class="storageArea">
            <div class="storageLabel">🏪 仓库 (<span class="stCount" id="storageCount">0/6</span>) — 点击仓库道具可放回背包，点击背包道具可放入仓库</div>
            <div class="storageSlots" id="storageSlots"></div>
          </div>
          <div class="sellZone" id="sellZone"><span class="sellIcon">💸</span>拖拽到此处出售 (返还50%金币)</div>
        </div>
      </div>
      <!-- 战斗 -->
      <div id="battlePhase">
        <div class="battleInfo"><span class="vs" id="vsText"></span></div>
        <div class="battleTimer" id="battleTimerUI">⏱️ 剩余时间: <span id="battleTimeText">25s</span><div class="timeBar"><div class="timeBarFill" id="battleTimeBar" style="width:100%"></div></div></div>
        <div class="battleField">
          <div class="bSide" id="bLeft"><h3 class="left" id="leftName">我</h3><div class="hpBarWrap"><div class="hpBar" id="leftHpBar" style="width:100%"><span class="hpText" id="leftHpText">100/100</span></div></div><div class="bItems" id="leftItems"></div></div>
          <div style="font-size:36px;color:#555;">⚔️</div>
          <div class="bSide" id="bRight"><h3 class="right" id="rightName">对手</h3><div class="hpBarWrap"><div class="hpBar" id="rightHpBar" style="width:100%"><span class="hpText" id="rightHpText">100/100</span></div></div><div class="bItems" id="rightItems"></div></div>
        </div>
        <div class="battleLog" id="battleLog"></div>
      </div>
    </div>
  </div>
</div>

<!-- 合成动画 -->
<div id="mergeOverlay"></div>
<!-- 回合结算 -->
<div id="resultOverlay"><div class="resultBox" id="resultBox"></div></div>
<!-- 事件 -->
<div id="eventOverlay"><div class="eventBox" id="eventBox"></div></div>
<!-- 肉鸽技能选择 -->
<div id="perkOverlay"><div class="perkBox" id="perkBox"></div></div>
<!-- 淘汰动画 -->
<div id="elimOverlay"></div>
<!-- 最终排名 -->
<div id="finalScreen"><h1 id="finalTitle"></h1><ol class="rankList" id="rankList"></ol><button onclick="location.reload()">再来一局</button></div>
<!-- 提示 -->
<div class="tooltip" id="tooltip"></div>

const PERK_INTERVAL=4; // 每4回合选一次技能

const AI_NAMES=['阿拉丁','辛巴达','茉莉','贾方','哈桑','法蒂玛','纳迪尔'];
const TYPE_LABEL={weapon:'⚔️武器',shield:'🛡️防御',heal:'💊治疗',burn:'🔥灼烧',poison:'☠️毒素',buff:'💫增益',special:'✨特殊'};
const TYPE_COLOR={weapon:'#f88',shield:'#4df',heal:'#4f4',burn:'#fa0',poison:'#c4f',buff:'#ff0',special:'#c8f'};

// ============== 全局状态 ==============
let G={round:0,phase:'start',gold:0,maxSlots:4,maxStorage:4,shopTimer:null,shopTime:45,frozen:false,myHero:null,players:[],myIdx:0,elimOrder:[],battleSpeed:1};

// ============== 背景粒子 ==============
const cvs=document.getElementById('bgCanvas'),ctx=cvs.getContext('2d');
let particles=[];
function initBg(){cvs.width=innerWidth;cvs.height=innerHeight;particles=[];for(let i=0;i<60;i++)particles.push({x:Math.random()*cvs.width,y:Math.random()*cvs.height,r:Math.random()*2+.5,dx:(Math.random()-.5)*.3,dy:(Math.random()-.5)*.3,a:Math.random()*.5+.2});}
function drawBg(){ctx.clearRect(0,0,cvs.width,cvs.height);for(let p of particles){ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=`rgba(255,210,0,${p.a})`;ctx.fill();p.x+=p.dx;p.y+=p.dy;if(p.x<0||p.x>cvs.width)p.dx*=-1;if(p.y<0||p.y>cvs.height)p.dy*=-1;}requestAnimationFrame(drawBg);}
initBg();drawBg();window.addEventListener('resize',initBg);

// ============== 英雄选择 ==============

// ============== 启动游戏 ==============
function startGame(){
  document.getElementById('startScreen').style.display='none';
  document.getElementById('gameUI').style.display='flex';
  // 初始化8位玩家
  G.players=[];
  G.myIdx=0;
  G.players.push({name:'我 ('+G.myHero.name+')',hero:G.myHero,hp:G.myHero.baseHp,maxHp:G.myHero.baseHp,gold:6,items:[],storage:[],perks:[],alive:true,wins:0,losses:0,ai:false,lv:1,xp:0,xpNeed:2});
  for(let i=0;i<7;i++){
    let h=HEROES[Math.floor(Math.random()*HEROES.length)];
    G.players.push({name:AI_NAMES[i]+' ('+h.name+')',hero:h,hp:h.baseHp,maxHp:h.baseHp,gold:6,items:[],storage:[],perks:[],alive:true,wins:0,losses:0,ai:true,lv:1,xp:0,xpNeed:2,aiSlots:4});
  }
  G.round=0;G.elimOrder=[];
  nextRound();
}

// ============== 回合流转 ==============
function nextRound(){
  G.round++;
  let alive=G.players.filter(p=>p.alive);
  if(alive.length<=1){showFinal();return;}
  G.phase='shop';
  let me=G.players[G.myIdx];
  // 回合收入
  let perkGold=getPerkBuffs(me).goldPerRound||0;
  let income=5+Math.min(G.round,5)+(me.hero.passive==='goldPerRound'?me.hero.val:0)+perkGold;
  me.gold+=income;
  G.gold=me.gold;
  // AI收入
  G.players.forEach((p,i)=>{if(i!==G.myIdx&&p.alive){let aiPerkGold=getPerkBuffs(p).goldPerRound||0;p.gold+=5+Math.min(G.round,5)+(p.hero.passive==='goldPerRound'?p.hero.val:0)+aiPerkGold;}});
  // AI购物
  G.players.forEach((p,i)=>{if(p.ai&&p.alive)aiShop(p);});
  updateTopBar();updatePlayersPanel();
  showShop();
}

// ============== 商店系统 ==============
function getShopPool(){
  let pool=[];let r=G.round;
  ITEMS_DB.forEach(it=>{
    let w=0;
    if(it.rarity==='common')w=r<4?8:5;
    if(it.rarity==='rare')w=r<3?2:r<6?5:4;
    if(it.rarity==='epic')w=r<4?0:r<7?3:4;
    if(it.rarity==='legend')w=r<6?0:r<8?1:3;
    for(let i=0;i<w;i++)pool.push(it);
  });
  return pool;
}
function rollShop(count){
  let pool=getShopPool();let res=[];
  for(let i=0;i<count;i++){if(pool.length===0)break;let idx=Math.floor(Math.random()*pool.length);res.push({...pool[idx],lv:1});pool.splice(idx,1);}
  return res;
}
let shopOffers=[];
function showShop(){
  document.getElementById('shopPhase').style.display='flex';
  document.getElementById('battlePhase').style.display='none';
  if(!G.frozen)shopOffers=rollShop(4+Math.floor(G.round/3));
  G.frozen=false;
  renderShop();renderBoard();renderStorage();startShopTimer();initSellZone();updateExpandBtn();
  document.getElementById('phaseText').textContent='🛒 商店阶段';
}
function renderShop(){
  const c=document.getElementById('shopItems');c.innerHTML='';
  let me=G.players[G.myIdx];
  shopOffers.forEach((it,i)=>{
    let canMrg=canMergeWith(me,it)||canMergeWithStorage(me,it);
    let d=document.createElement('div');d.className='shopItem r-'+it.rarity+(it.size>=2?' size'+Math.min(it.size,3):'')+(G.frozen?' frozen':'')+(canMrg?' canMerge':'');
    let sizeTag=it.size>=2?`<span style="position:absolute;bottom:4px;right:6px;font-size:9px;color:#888;background:rgba(0,0,0,.3);padding:1px 5px;border-radius:4px;">${it.size}格</span>`:'';
    let typeTag=`<span class="sType t-${it.type}">${TYPE_LABEL[it.type]||it.type}</span>`;
    let mergeTag=canMrg?`<span style="position:absolute;top:18px;right:4px;font-size:8px;color:#ffd200;background:rgba(255,210,0,.15);padding:1px 5px;border-radius:4px;border:1px solid rgba(255,210,0,.3);">⚡合成</span>`:'';
    d.innerHTML=`<span class="sRarity">${{common:'普通',rare:'稀有',epic:'史诗',legend:'传说'}[it.rarity]}</span><span class="sCost">${it.cost}💰</span>${mergeTag}<div class="sIcon">${it.icon}</div><div class="sName">${it.name}</div><div class="sDesc">${it.desc}</div>${typeTag}${sizeTag}`;
    d.onclick=()=>buyItem(i);
    d.onmouseenter=e=>showTooltip(e,it);d.onmouseleave=hideTooltip;
    c.appendChild(d);
  });
  // 更新冻结按钮样式
  let freezeBtn=document.querySelector('.btnFreeze');
  if(freezeBtn){
    freezeBtn.className='btnFreeze'+(G.frozen?' active':'');
    freezeBtn.innerHTML=G.frozen?'❄️ 已冻结':'❄️ 冻结';
  }
}
function canMergeWith(player,item){
  // 检查背包中是否有同ID同等级的道具可以合成
  for(let i=0;i<player.items.length;i++){
    let a=player.items[i];
    if(a&&a.id===item.id&&(a.lv||1)===(item.lv||1))return true;
  }
  return false;
}
function canMergeWithStorage(player,item){
  // 检查仓库中是否有同ID同等级的道具可以合成
  for(let i=0;i<(player.storage||[]).length;i++){
    let a=player.storage[i];
    if(a&&a.id===item.id&&(a.lv||1)===(item.lv||1))return true;
  }
  return false;
}
function buyItem(idx){
  let me=G.players[G.myIdx];let it=shopOffers[idx];if(!it)return;
  if(me.gold<it.cost)return floatMsg('金币不足!','#f44');
  let usedSlots=me.items.reduce((s,x)=>s+(x?x.size||1:0),0);
  let bagFull=usedSlots+(it.size||1)>G.maxSlots;
  // 检查仓库中是否有可合成的同类道具 → 先取出到背包合成
  if(canMergeWithStorage(me,it)){
    // 从仓库取出同类道具放进背包，再加入新道具一起合成
    for(let si=0;si<me.storage.length;si++){
      let st=me.storage[si];
      if(st&&st.id===it.id&&(st.lv||1)===(it.lv||1)){
        me.storage.splice(si,1);
        me.items.push(st);
        break;
      }
    }
    me.gold-=it.cost;G.gold=me.gold;
    me.items.push({...it});
    shopOffers.splice(idx,1);
    checkMerge(me);
    renderShop();renderBoard();renderStorage();updateTopBar();
    floatMsg('-'+it.cost+'💰 仓库合成!','#ffd200');
    return;
  }
  // 背包满时，检查是否能合成
  if(bagFull&&canMergeWith(me,it)){
    floatMsg('背包已满，自动合成!','#ffd200');
  }else if(bagFull&&me.storage.length<G.maxStorage){
    // 背包满但仓库有空位 → 放入仓库
    me.gold-=it.cost;G.gold=me.gold;
    me.storage.push({...it,lv:1});
    shopOffers.splice(idx,1);
    renderShop();renderBoard();renderStorage();updateTopBar();
    floatMsg('-'+it.cost+'💰 → 已放入仓库','#4df');
    return;
  }else if(bagFull){
    return floatMsg('物品栏和仓库都满了!','#f44');
  }
  me.gold-=it.cost;G.gold=me.gold;
  me.items.push({...it});
  shopOffers.splice(idx,1);
  // 检查合成
  checkMerge(me);
  renderShop();renderBoard();renderStorage();updateTopBar();
  floatMsg('-'+it.cost+'💰','#ffd200');
}

// ============== 道具合成系统 ==============
let mergeQueue=[];
function checkMerge(player){
  let merged=true;
  while(merged){
    merged=false;
    for(let i=0;i<player.items.length;i++){
      for(let j=i+1;j<player.items.length;j++){
        let a=player.items[i],b=player.items[j];
        if(!a||!b)continue;
        if(a.id===b.id&&(a.lv||1)===(b.lv||1)){
          let oldIcon=a.icon;let oldName=a.name;let oldLv=a.lv||1;
          let newLv=(a.lv||1)+1;
          player.items[i].lv=newLv;
          player.items.splice(j,1);
          merged=true;
          // 只给玩家播放动画
          if(player===G.players[G.myIdx]){
            mergeQueue.push({icon:oldIcon,name:oldName,oldLv:oldLv,newLv:newLv,resultItem:player.items[i]});
          }
          break;
        }
      }
      if(merged)break;
    }
  }
  // 播放合成动画队列
  if(player===G.players[G.myIdx]&&mergeQueue.length>0){
    playMergeAnimations();
  }
}
function playMergeAnimations(){
  if(mergeQueue.length===0)return;
  let info=mergeQueue.shift();
  showMergeAnimation(info,()=>{
    renderBoard();renderStorage();updateTopBar();
    if(mergeQueue.length>0){
      setTimeout(()=>playMergeAnimations(),200);
    }
  });
}
function showMergeAnimation(info,onDone){
  const overlay=document.getElementById('mergeOverlay');
  overlay.className='active';
  overlay.style.display='flex';
  // 构建动画HTML
  let starsHtml='';
  for(let i=0;i<12;i++){
    let angle=Math.random()*Math.PI*2;
    let dist=60+Math.random()*80;
    let tx=Math.cos(angle)*dist;
    let ty=Math.sin(angle)*dist;
    let stars=['✨','⭐','💫','🌟'];
    starsHtml+=`<span class="mergeStar" style="--tx:${tx}px;--ty:${ty}px;animation-delay:${0.4+Math.random()*0.3}s;">${stars[Math.floor(Math.random()*stars.length)]}</span>`;
  }
  overlay.innerHTML=`
    <div style="position:relative;display:flex;align-items:center;justify-content:center;">
      <div class="mergeFlash"></div>
      ${starsHtml}
      <span class="mergeItem fly-left">${info.icon}</span>
      <span style="font-size:32px;color:#ffd200;margin:0 10px;opacity:.6;">+</span>
      <span class="mergeItem fly-right">${info.icon}</span>
    </div>
    <div class="mergeResultItem">${info.resultItem.icon}</div>
    <div class="mergeResultName">⚡ ${info.name} Lv${info.oldLv} → Lv${info.newLv}</div>
  `;
  // 1.5秒后自动关闭
  setTimeout(()=>{
    overlay.style.display='none';
    overlay.className='';
    overlay.innerHTML='';
    if(onDone)onDone();
  },1600);
}
function showMergeNotice(item){
  // 保留简单提示备用（AI用）
}
function refreshShop(){
  let me=G.players[G.myIdx];if(me.gold<1)return floatMsg('金币不足!','#f44');
  me.gold-=1;G.gold=me.gold;shopOffers=rollShop(4+Math.floor(G.round/3));
  renderShop();updateTopBar();floatMsg('-1💰 刷新','#4df');
}
function toggleFreeze(){G.frozen=!G.frozen;renderShop();floatMsg(G.frozen?'❄️ 已冻结商店':'🔓 已解冻',G.frozen?'#67e8f9':'#aaa');}

// ============== 拖拽出售系统 ==============
let dragIdx=-1;
let sellZoneInited=false;
function initSellZone(){
  if(sellZoneInited)return;
  sellZoneInited=true;
  const sz=document.getElementById('sellZone');
  sz.addEventListener('dragover',e=>{e.preventDefault();sz.classList.add('dragover');});
  sz.addEventListener('dragleave',()=>{sz.classList.remove('dragover');});
  sz.addEventListener('drop',e=>{
    e.preventDefault();sz.classList.remove('dragover');
    let data=e.dataTransfer.getData('text/plain');
    let me=G.players[G.myIdx];
    if(data.startsWith('storage:')){
      let idx=parseInt(data.split(':')[1]);
      if(isNaN(idx)||!me.storage[idx])return;
      let it=me.storage[idx];let refund=Math.floor(it.cost*0.5*(it.lv||1));
      me.gold+=refund;G.gold=me.gold;
      me.storage.splice(idx,1);
      renderBoard();renderStorage();updateTopBar();floatMsg('+'+refund+'💰 卖出 '+it.icon+it.name,'#4f4');
    }else{
      let idx=parseInt(data);
      if(isNaN(idx)||!me.items[idx])return;
      let it=me.items[idx];let refund=Math.floor(it.cost*0.5*(it.lv||1));
      me.gold+=refund;G.gold=me.gold;
      me.items.splice(idx,1);
      renderBoard();renderStorage();updateTopBar();floatMsg('+'+refund+'💰 卖出 '+it.icon+it.name,'#4f4');
    }
  });
}
function slotClick(idx){
  // 点击背包道具 → 放入仓库
  let me=G.players[G.myIdx];
  if(!me.items[idx])return;
  if(me.storage.length>=G.maxStorage)return floatMsg('仓库已满!','#f44');
  let it=me.items.splice(idx,1)[0];
  me.storage.push(it);
  floatMsg(it.icon+' → 仓库','#4df');
  renderBoard();renderStorage();updateTopBar();
}
function storageClick(idx){
  // 点击仓库道具 → 放回背包
  let me=G.players[G.myIdx];
  if(!me.storage[idx])return;
  let usedSlots=me.items.reduce((s,x)=>s+(x?x.size||1:0),0);
  let it=me.storage[idx];
  if(usedSlots+(it.size||1)>G.maxSlots)return floatMsg('背包已满!','#f44');
  me.storage.splice(idx,1);
  me.items.push(it);
  floatMsg(it.icon+' → 背包','#4f4');
  // 放回背包后检查合成
  checkMerge(me);
  renderBoard();renderStorage();updateTopBar();
}
function renderStorage(){
  const c=document.getElementById('storageSlots');c.innerHTML='';
  let me=G.players[G.myIdx];
  me.storage.forEach((it,i)=>{
    let d=document.createElement('div');d.className='storageSlot filled sr-'+(it.rarity||'common');
    d.draggable=true;
    d.innerHTML=`<span class="ssLv">Lv${it.lv||1}</span><span class="ssIcon">${it.icon}</span><span class="ssName">${it.name}</span>`;
    d.onclick=()=>storageClick(i);
    d.onmouseenter=e=>showTooltip(e,it,true);d.onmouseleave=hideTooltip;
    d.addEventListener('dragstart',e=>{
      e.dataTransfer.setData('text/plain','storage:'+i);
      d.style.opacity='.4';
      document.getElementById('sellZone').style.borderColor='#f44';
    });
    d.addEventListener('dragend',()=>{
      d.style.opacity='';
      let sz=document.getElementById('sellZone');if(sz)sz.style.borderColor='';
    });
    c.appendChild(d);
  });
  for(let i=me.storage.length;i<G.maxStorage;i++){
    let d=document.createElement('div');d.className='storageSlot';d.innerHTML='<span style="color:#333;font-size:14px;">+</span>';
    c.appendChild(d);
  }
  document.getElementById('storageCount').textContent=me.storage.length+'/'+G.maxStorage;
}
function renderBoard(){
  const c=document.getElementById('boardSlots');c.innerHTML='';
  let me=G.players[G.myIdx];
  const rarityLabel={common:'普',rare:'稀',epic:'史',legend:'传'};
  const rarityCls={common:'rc',rare:'rr',epic:'re',legend:'rl'};
  me.items.forEach((it,i)=>{
    let sz=it.size||1;
    let d=document.createElement('div');d.className='slot filled sr-'+(it.rarity||'common')+(sz>=2?' size'+Math.min(sz,3):'');
    d.draggable=true;
    let sizeTag=sz>=2?`<span class="slSize">${sz}格</span>`:'';
    let typeTag=`<span class="slType" style="color:${TYPE_COLOR[it.type]||'#888'}">${TYPE_LABEL[it.type]||''}</span>`;
    d.innerHTML=`<span class="slRarity ${rarityCls[it.rarity]||'rc'}">${rarityLabel[it.rarity]||'普'}</span><span class="slLv">Lv${it.lv||1}</span><span class="slIcon">${it.icon}</span><span class="slName">${it.name}</span>${typeTag}${sizeTag}`;
    d.addEventListener('dragstart',e=>{
      dragIdx=i;e.dataTransfer.setData('text/plain',String(i));
      d.classList.add('dragging');
      document.getElementById('sellZone').style.borderColor='#f44';
    });
    d.addEventListener('dragend',()=>{
      d.classList.remove('dragging');dragIdx=-1;
      let sz=document.getElementById('sellZone');if(sz)sz.style.borderColor='';
    });
    d.onclick=()=>slotClick(i);
    d.onmouseenter=e=>showTooltip(e,it,true);d.onmouseleave=hideTooltip;
    c.appendChild(d);
  });
  let usedSlots=me.items.reduce((s,x)=>s+(x?x.size||1:0),0);
  for(let i=usedSlots;i<G.maxSlots;i++){
    let d=document.createElement('div');d.className='slot';d.innerHTML='<span style="color:#444;font-size:22px;">+</span>';
    c.appendChild(d);
  }
  let lbl=document.getElementById('boardLabel');
  if(lbl)lbl.textContent='📦 我的物品栏 ('+usedSlots+'/'+G.maxSlots+'格已用) — 拖拽物品到下方出售';
}
function startShopTimer(){
  G.shopTime=45;clearInterval(G.shopTimer);
  const el=document.getElementById('shopTimer');
  G.shopTimer=setInterval(()=>{
    G.shopTime--;el.textContent='剩余 '+G.shopTime+'s';
    if(G.shopTime<=10)el.style.color='#f44';else el.style.color='';
    if(G.shopTime<=0){clearInterval(G.shopTimer);forceReady();}
  },1000);
}
function forceReady(){clearInterval(G.shopTimer);startBattlePhase();}
function readyUp(){
  let me=G.players[G.myIdx];
  let usedSlots=me.items.reduce((s,x)=>s+(x?x.size||1:0),0);
  if(usedSlots>G.maxSlots){
    floatMsg('⚠️ 背包超出上限! 请出售或移入仓库多余道具 ('+usedSlots+'/'+G.maxSlots+')','#f44');
    return;
  }
  clearInterval(G.shopTimer);startBattlePhase();
}
function expandSlots(){
  let me=G.players[G.myIdx];
  if(G.maxSlots>=11)return floatMsg('已达最大格子数!','#888');
  let cost=getExpandCost();
  if(me.gold<cost)return floatMsg('金币不足! 需要'+cost+'💰','#f44');
  me.gold-=cost;G.gold=me.gold;
  G.maxSlots++;
  floatMsg('📦 +1格子! ('+G.maxSlots+'/11)','#f59e0b');
  renderBoard();renderStorage();updateTopBar();updateExpandBtn();
}
function getExpandCost(){
  // 固定价格递增：第5格=4, 第6格=5, 第7格=7, 第8格=9, 第9格=11, 第10格=14, 第11格=16
  let expanded=G.maxSlots-4; // 已扩充次数
  let costs=[4,5,7,9,11,14,16];
  return costs[expanded]||16;
}
function updateExpandBtn(){
  let btn=document.getElementById('btnExpand');
  let costText=document.getElementById('expandCostText');
  if(!btn)return;
  if(G.maxSlots>=11){
    btn.className='btnExpand maxed';
    btn.onclick=null;
    costText.textContent='已满';
  }else{
    let cost=getExpandCost();
    costText.textContent=cost+'💰';
    btn.className='btnExpand';
  }
}

// ============== AI 购物 ==============
// AI分析对手阵容：检测对手是否有大量护盾（"软墙"）
function aiAnalyzeEnemyShield(){
  // 扫描所有存活玩家，估算他们的护盾产出能力
  let avgShieldPower=0;let count=0;
  G.players.forEach(p=>{
    if(!p.alive)return;count++;
    p.items.forEach(it=>{
      if(!it)return;
      let lv=it.lv||1;let m=1+(lv-1)*0.5;
      if(it.type==='shield')avgShieldPower+=it.shield*m/(it.cd||3);
    });
  });
  return count>0?avgShieldPower/count:0;
}
function aiShop(p){
  // AI格子持久化
  if(!p.aiSlots)p.aiSlots=4;
  let aiMaxSlots=p.aiSlots;

  // === AI扩充格子策略：只有格子快满了才扩（已用>=aiMaxSlots-1） ===
  let usedBefore=p.items.reduce((s,x)=>s+(x?x.size||1:0),0);
  let aiExpandCosts=[3,4,5,6,7,8,9];
  if(usedBefore>=aiMaxSlots-1){
    // 格子快满了，考虑扩充
    while(p.aiSlots<11){
      let expandIdx=p.aiSlots-4;
      let cost=aiExpandCosts[expandIdx]||9;
      if(p.gold>=cost+4){p.gold-=cost;p.aiSlots++;}else break;
      // 每次只扩1格，剩下的钱用来买道具
      break;
    }
    aiMaxSlots=p.aiSlots;
  }

  // === AI分析对手护盾 ===
  let enemyShieldPower=aiAnalyzeEnemyShield();
  let hasWallBreaker=p.items.some(it=>it&&(it.wallBreakPct||it.siegeDmg||it.remoteDmg));
  let needsWallBreak=(p.lastEnemyShieldHigh)||(!hasWallBreaker&&enemyShieldPower>6);

  // === AI卖弱换强（可多次） ===
  for(let sell=0;sell<3;sell++){
    let used=p.items.reduce((s,x)=>s+(x?x.size||1:0),0);
    if(used<aiMaxSlots&&p.gold>=4)break; // 有空位且有钱，不用卖
    // 找最弱道具
    let weakIdx=-1,weakPw=Infinity;
    p.items.forEach((it,idx)=>{
      if(!it)return;
      let pw=aiItemPower(it);
      if(pw<weakPw){weakPw=pw;weakIdx=idx;}
    });
    // 最弱道具战力低于15且背包满或金币不够买好东西时卖掉
    if(weakIdx>=0&&weakPw<15&&(used>=aiMaxSlots||p.gold<4)){
      let it=p.items[weakIdx];
      p.gold+=Math.floor((it.cost||3)*0.5*(it.lv||1));
      p.items.splice(weakIdx,1);
    }else break;
  }

  // === AI也卖仓库垃圾 ===
  for(let si=p.storage.length-1;si>=0;si--){
    let st=p.storage[si];
    if(st&&aiItemPower(st)<8){
      p.gold+=Math.floor((st.cost||3)*0.5*(st.lv||1));
      p.storage.splice(si,1);
    }
  }

  // === 构建"凑合成"清单 ===
  let ownedCount={};
  p.items.forEach(it=>{if(it){let k=it.id+'_'+(it.lv||1);ownedCount[k]=(ownedCount[k]||0)+1;}});
  (p.storage||[]).forEach(it=>{if(it){let k=it.id+'_'+(it.lv||1);ownedCount[k]=(ownedCount[k]||0)+1;}});

  // === 购物主循环 ===
  for(let t=0;t<14;t++){
    let pool=getShopPool();
    let affordable=pool.filter(x=>x.cost<=p.gold);
    if(!affordable.length)break;

    let pick=null;

    // 阵容分析
    let hasWeapon=0,hasShield=0,hasHeal=0,hasDot=0,hasBuff=0;
    p.items.forEach(it=>{
      if(!it)return;
      if(it.type==='weapon')hasWeapon++;
      else if(it.type==='shield')hasShield++;
      else if(it.type==='heal')hasHeal++;
      else if(it.type==='burn'||it.type==='poison')hasDot++;
      else if(it.type==='buff')hasBuff++;
    });

    // ★ 优先级1: 可立即合成
    {
      let mergeable=affordable.filter(x=>canMergeWith(p,{...x,lv:1})||canMergeWithStorage(p,{...x,lv:1}));
      if(mergeable.length>0){
        pick=mergeable.reduce((best,x)=>aiItemPower(x)>aiItemPower(best)?x:best,mergeable[0]);
      }
    }

    // ★ 优先级2: 凑合成——手里有1个的同款，再买1个凑一对
    if(!pick){
      let singles=affordable.filter(x=>{
        let k=x.id+'_1';
        return (ownedCount[k]||0)===1;
      });
      if(singles.length>0){
        pick=singles.reduce((a,b)=>aiItemPower(a)>aiItemPower(b)?a:b,singles[0]);
      }
    }

    // 优先级3: 破盾
    if(!pick&&needsWallBreak&&!hasWallBreaker){
      let wb=affordable.filter(x=>x.wallBreakPct||x.siegeDmg||x.remoteDmg);
      if(wb.length>0)pick=wb.reduce((a,b)=>aiItemPower(a)>aiItemPower(b)?a:b,wb[0]);
    }

    // 优先级4: 阵容配比
    if(!pick){
      if(hasWeapon===0){
        let w=affordable.filter(x=>x.type==='weapon');
        if(w.length>0)pick=w.reduce((a,b)=>aiItemPower(a)>aiItemPower(b)?a:b,w[0]);
      }else if(hasShield===0&&hasWeapon>=1){
        let d=affordable.filter(x=>x.type==='shield');
        if(d.length>0)pick=d.reduce((a,b)=>aiItemPower(a)>aiItemPower(b)?a:b,d[0]);
      }else if(hasHeal===0&&hasWeapon>=1){
        let h=affordable.filter(x=>x.type==='heal');
        if(h.length>0)pick=h.reduce((a,b)=>aiItemPower(a)>aiItemPower(b)?a:b,h[0]);
      }else if(hasBuff===0&&hasWeapon>=1){
        let bf=affordable.filter(x=>x.type==='buff');
        if(bf.length>0)pick=bf.reduce((a,c)=>aiItemPower(a)>aiItemPower(c)?a:c,bf[0]);
      }else if(hasWeapon<3){
        let w=affordable.filter(x=>x.type==='weapon');
        if(w.length>0)pick=w.reduce((a,b)=>aiItemPower(a)>aiItemPower(b)?a:b,w[0]);
      }else if(hasDot===0){
        let d=affordable.filter(x=>x.type==='burn'||x.type==='poison');
        if(d.length>0)pick=d.reduce((a,b)=>aiItemPower(a)>aiItemPower(b)?a:b,d[0]);
      }
    }

    // 优先级5: 格子空位多时→优先多买道具填满
    if(!pick){
      let used=p.items.reduce((s,x)=>s+(x?x.size||1:0),0);
      let emptySlots=aiMaxSlots-used;
      if(emptySlots>=2){
        // 空位多：按剩余金币和空位数分配预算，但至少4金
        let budgetPerItem=Math.max(4,Math.floor(p.gold/emptySlots));
        let fits=affordable.filter(x=>x.cost<=budgetPerItem&&(x.size||1)<=1);
        if(fits.length===0)fits=affordable.filter(x=>(x.size||1)<=1);
        if(fits.length>0){
          fits.sort((a,b)=>aiItemPower(b)-aiItemPower(a));
          pick=fits[0];
        }
      }
    }

    // 优先级6: 买最强道具（优先非普通）
    if(!pick){
      let good=affordable.filter(x=>x.rarity!=='common');
      if(good.length===0)good=affordable;
      good.sort((a,b)=>aiItemPower(b)-aiItemPower(a));
      pick=good[0];
    }

    if(!pick)break;

    let used=p.items.reduce((s,x)=>s+(x?x.size||1:0),0);
    let bagFull=used+(pick.size||1)>aiMaxSlots;
    if(bagFull&&!canMergeWith(p,pick)){
      if(p.storage.length<G.maxStorage){
        p.gold-=pick.cost;p.storage.push({...pick,lv:1});
        let k=pick.id+'_1';ownedCount[k]=(ownedCount[k]||0)+1;
        continue;
      }
      // 替换最弱（门槛1.3倍）
      let weakIdx2=-1,weakPw2=Infinity;
      p.items.forEach((it,idx)=>{if(it){let pw=aiItemPower(it);if(pw<weakPw2){weakPw2=pw;weakIdx2=idx;}}});
      if(weakIdx2>=0&&aiItemPower(pick)>weakPw2*1.3){
        let old=p.items[weakIdx2];
        p.gold+=Math.floor((old.cost||3)*0.5*(old.lv||1));
        p.items.splice(weakIdx2,1);
        p.gold-=pick.cost;p.items.push({...pick,lv:1});
        if(pick.wallBreakPct||pick.siegeDmg||pick.remoteDmg)hasWallBreaker=true;
        checkMerge(p);
        let k=pick.id+'_1';ownedCount[k]=(ownedCount[k]||0)+1;
        continue;
      }
      break;
    }
    p.gold-=pick.cost;p.items.push({...pick,lv:1});
    if(pick.wallBreakPct||pick.siegeDmg||pick.remoteDmg)hasWallBreaker=true;
    let k=pick.id+'_1';ownedCount[k]=(ownedCount[k]||0)+1;
    checkMerge(p);
  }

  // === 仓库→背包合成 ===
  for(let si=p.storage.length-1;si>=0;si--){
    let st=p.storage[si];
    if(!st)continue;
    if(canMergeWith(p,st)){
      p.storage.splice(si,1);
      p.items.push(st);
      checkMerge(p);
    }
  }
  // === 仓库道具放回背包（如果有空位） ===
  for(let si=p.storage.length-1;si>=0;si--){
    let st=p.storage[si];
    if(!st)continue;
    let used=p.items.reduce((s,x)=>s+(x?x.size||1:0),0);
    if(used+(st.size||1)<=aiMaxSlots){
      p.storage.splice(si,1);
      p.items.push(st);
      checkMerge(p);
    }
  }
}

// AI道具评分函数（不给额外资源，只是让AI更聪明地评估）
function aiItemPower(it){
  if(!it)return 0;
  let m=1+((it.lv||1)-1)*0.5;
  let pw=0;
  if(it.dmg)pw+=it.dmg*m/(it.cd||2);
  if(it.heal)pw+=it.heal*m/(it.cd||3)*0.8;
  if(it.shield)pw+=it.shield*m/(it.cd||3)*0.7;
  if(it.burnDmg)pw+=it.burnDmg*(it.burnStack||1)*m;
  if(it.poisonDmg)pw+=it.poisonDmg*(it.poisonStack||1)*m*1.2;
  if(it.buffType)pw+=it.buffVal*40;
  if(it.remoteDmg)pw+=(it.remoteDmg||0)*m*0.6;
  if(it.wallBreakPct)pw+=30*m;
  if(it.siegeDmg)pw+=(it.siegeDmg||0)*m*0.8;
  if(it.freezeTime)pw+=20*m;
  if(it.reflectPct)pw+=15*m;
  if(it.lifesteal)pw+=20*m;
  return pw;
}
